  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #4A6FA5;

      /* === 功能色 === */

      --radius-sm:   0.25rem;

      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);

  <!-- 打字机动画样式 -->
  <style>
    /* 打字机逐字出现动画 */
    @keyframes typewriter-char {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .typewriter-char {
      opacity: 0;
      animation: typewriter-char 0.05s forwards;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

    <div class="relative bg-surface shadow-card rounded-xl overflow-hidden mt-8">
      <!-- 模糊遮罩背景 -->
      <div class="absolute inset-0 backdrop-blur-md bg-surface/60 z-10"></div>
      <!-- 底部装饰性卡片轮廓（被模糊遮罩覆盖） -->
      <div class="p-5 opacity-30">
        <h3 class="font-serif text-2xl font-bold text-on-surface tracking-wider">张 溪 蕴</h3>
        <div class="flex items-center gap-2 mt-2">
          <span class="inline-flex items-center gap-1 text-xs font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-wuxing-shui"></span>
            <span>水</span>
          </span>
          <span class="inline-flex items-center gap-1 text-xs font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-wuxing-mu"></span>
            <span>木</span>
          </span>
          <span class="inline-flex items-center gap-1 text-xs font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-wuxing-mu"></span>
            <span>木</span>
          </span>
        </div>
        <p class="text-xs text-on-surface-variant italic mt-2">"溪流潺潺，蕴藏灵秀"</p>
      </div>
      <!-- 解锁内容浮层 -->
      <div class="absolute inset-0 z-20 flex flex-col items-center justify-center text-center px-6">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-accent/10 mb-3">
          <i data-lucide="lock" class="w-5 h-5 text-accent"></i>
        </div>
        <p class="text-base font-semibold text-on-surface mb-1">解锁全部名字 + AI深度解读</p>
        <p class="text-xs text-on-surface-variant mb-4">已有 5 个名字免费展示，解锁查看更多</p>
        <button id="btn-unlock" class="bg-accent text-on-accent px-6 py-2.5 rounded-lg text-sm font-semibold hover:opacity-90 active:scale-[0.98] transition-all">
          ¥29.9 立即解锁
        </button>
      </div>
    </div>

    <!-- 底部间距 -->
    <div class="h-8"></div>

  </main>
  <!-- @main-content:end -->

  <script>
    // 初始化 Lucide 图标
    lucide.createIcons();

    $(function () {

      // === AI分析文字打字机效果 ===
      var analysisText = '基于甲木日主、食神格，喜用神为水、木。建议名字补水木为佳，优先考虑诗词出处，兼顾音韵和谐。甲木参天，得水则生，遇木则辅，五行搭配以水木相生为上善之选。';
      var $target = $('#ai-analysis-text');
      var chars = analysisText.split('');

      // 将每个字符包裹在 span 中，设置递增的 animation-delay
      var html = '';
      for (var i = 0; i < chars.length; i++) {
        var delay = (i * 40); // 每字 40ms 延迟
        var ch = chars[i];
        if (ch === '，' || ch === '。' || ch === '、') {
          // 标点符号稍长停顿
          delay += 80;
        }
        html += '<span class="typewriter-char" style="animation-delay:' + delay + 'ms">' + ch + '</span>';
      }
      $target.html(html);

      // === 收藏按钮交互 ===
      $('.name-card-fav-btn').on('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        var $btn = $(this);
        var $icon = $btn.find('[data-lucide]');
        var isFaved = $btn.data('faved');

        if (isFaved) {
          // 取消收藏
          $btn.data('faved', false);
          $btn.removeClass('text-accent').addClass('text-on-surface-variant');
          $icon.attr('data-lucide', 'heart');
          $btn.find('.fav-text').text('收藏');
        } else {
          // 添加收藏
          $btn.data('faved', true);
          $btn.removeClass('text-on-surface-variant').addClass('text-accent');
          $icon.attr('data-lucide', 'heart');
          // 使用 CSS fill 模拟实心效果
          $icon.css('fill', 'currentColor');
          $btn.find('.fav-text').text('已收藏');
        }
        lucide.createIcons();
        // 重新设置 fill 状态（lucide.createIcons 会重置）
        if ($btn.data('faved')) {
          $btn.find('svg').css('fill', 'currentColor');
        }
      });

      // === 复制按钮交互 ===
      $('[id^="btn-copy-"]').on('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        var cardId = $(this).attr('id').replace('btn-copy-', '');
        var nameMap = { '1': '张悦宁', '2': '张泽萱', '3': '张清越', '4': '张润霖', '5': '张沐禾' };
        var name = nameMap[cardId] || '名字';

        // 复制到剪贴板
        if (navigator.clipboard) {
          navigator.clipboard.writeText(name).then(function () {
            console.log('已复制名字: ' + name);
          });
        } else {
          console.log('需要复制名字到剪贴板: ' + name);
        }

        // 临时改变按钮文字提示
        var $text = $(this).find('.text-xs');
        var origText = $text.text();
        $text.text('已复制');
        $(this).addClass('text-primary');
        setTimeout(function () {
          $text.text(origText);
          $(this).removeClass('text-primary');
        }.bind(this), 1500);
      });

      // === 分享按钮交互 ===
      $('[id^="btn-share-"]').on('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        var cardId = $(this).attr('id').replace('btn-share-', '');
        console.log('分享名字卡片 id=' + cardId + '，后续应调用系统分享 API 或展示分享弹窗');
      });

      // === 解锁按钮交互 ===
      $('#btn-unlock').on('click', function () {
        console.log('点击解锁按钮，后续应实现：1. 调起支付弹窗或跳转支付页 2. 支付成功后去除模糊遮罩 3. 展示全部名字列表和AI深度解读');
      });

      // === 名字卡片点击跳转（<a> 标签已自带 href 跳转，此处无需额外处理） ===
      // 按钮 stopPropagation 已阻止冒泡到 <a>，点击按钮不会触发卡片跳转

    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
