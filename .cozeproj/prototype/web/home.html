<!DOCTYPE html>

<head>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <!-- 字体 -->

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #4A6FA5;
      --color-primary-container:    #D4DFEF;
      --color-on-primary:           #ffffff;
      --color-secondary:            #5B9EA6;
      --color-secondary-container:  #D4ECF0;
      --color-on-secondary:         #ffffff;
      --color-accent:               #C75C5C;
      --color-accent-container:     #F5DCDC;
      --color-on-accent:            #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #FAF9F7;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #F5F3F0;
      --color-surface-container-high:     #EDE9E3;
      --color-surface-container-highest:  #E8E6E3;
      /* === 文字 === */
      --color-on-surface:           #1A1A1A;
      --color-on-surface-variant:   #666666;
      /* === 功能色 === */
      --color-success:  #5B8C5A;
      --color-error:    #C75C5C;
      --color-warning:  #C4A35A;
      /* === 边框 === */
      --color-outline:          #E8E6E3;
      --color-outline-variant:  #D4D0CA;
      /* === 五行专属色 === */
      --color-wuxing-jin:  #C9A96E;
      --color-wuxing-mu:   #5B8C5A;
      --color-wuxing-shui: #4A7FB5;
      --color-wuxing-huo:  #C75C5C;
      --color-wuxing-tu:   #C4A35A;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <style>
    /* 淡入动画 */
