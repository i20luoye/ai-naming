<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天衍 · AI起名结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: { 50:'#f5f0e8',100:'#e8e0d4',200:'#c4b9a8',300:'#a89e8e',400:'#5c5347',500:'#3d352c',600:'#2a231c',700:'#1a1510',800:'#110e0a',900:'#0a0806' },
                    gold: { 50:'#fdf8ed',100:'#f5e6c0',200:'#e8d09a',300:'#d4b06a',400:'#c8a45c',500:'#b08830',600:'#8c6c24',700:'#6a5119',800:'#48380f',900:'#2a2008' },
                    vermilion: { DEFAULT:'#c4564a', light:'#d4726a', dark:'#a04038' },
                },
                fontFamily: { serif:['"Noto Serif SC"','serif'], sans:['"Noto Sans SC"','sans-serif'] }
            }
        }
    }
    </script>
    <style>
        :root {
            --bg:#0a0806; --gold:#c8a45c; --gold-bright:#e8d09a; --gold-dim:#8c6c24;
            --vermilion:#c4564a; --text:#e8e0d4; --text-muted:#a89e8e;
            --border:rgba(200,164,92,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{
            background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;
            -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
        }
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg);}
        ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}

        .gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.35;}
        .glow-gold{text-shadow:0 0 60px rgba(200,164,92,0.15),0 0 120px rgba(200,164,92,0.05),0 0 4px rgba(200,164,92,0.08);}
        .glow-gold-strong{text-shadow:0 0 40px rgba(200,164,92,0.25),0 0 80px rgba(200,164,92,0.1),0 0 6px rgba(200,164,92,0.15);}
        .glow-score{text-shadow:0 0 12px rgba(200,164,92,0.35),0 0 4px rgba(200,164,92,0.25);}

        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0806;font-weight:600;letter-spacing:0.12em;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .btn-gold::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.6s ease;}
        .btn-gold:hover::before{left:100%;}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,164,92,0.3),0 0 12px rgba(200,164,92,0.15);}

        .btn-outline{border:1px solid rgba(200,164,92,0.35);color:var(--gold);background:transparent;transition:all 0.3s ease;}
        .btn-outline:hover{background:rgba(200,164,92,0.08);border-color:var(--gold);}

        .btn-ghost{color:var(--text-muted);background:transparent;transition:all 0.3s ease;font-size:11px;}
        .btn-ghost:hover{color:var(--gold);}

        .nav-link{position:relative;color:var(--text-muted);transition:color 0.3s;}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
        .nav-link:hover{color:var(--gold);}
        .nav-link:hover::after{width:100%;}

        .wx-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:4px;font-size:12px;font-family:'Noto Serif SC',serif;}
        .wx-金{background:rgba(232,208,154,0.12);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .wx-木{background:rgba(129,199,132,0.12);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .wx-水{background:rgba(100,181,246,0.12);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .wx-火{background:rgba(212,114,106,0.12);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .wx-土{background:rgba(212,196,160,0.12);color:#d4c4a0;border:1px solid rgba(212,196,160,0.25);}

        .analysis-card{background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);border:1px solid rgba(200,164,92,0.12);position:relative;overflow:hidden;}
        .analysis-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

        .progress-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;padding:6px 10px;min-width:56px;}
        .progress-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(200,164,92,0.2);background:transparent;transition:all 0.4s ease;}
        .progress-dot.completed{background:var(--gold);border-color:var(--gold);}
        .progress-dot.active{border-color:var(--gold);background:rgba(200,164,92,0.3);box-shadow:0 0 0 4px rgba(200,164,92,0.1);}
        .progress-connector{height:1px;flex:1;background:rgba(200,164,92,0.1);transition:background 0.4s ease;min-width:16px;}
        .progress-connector.completed{background:var(--gold);}

        /* 科技感装饰 */
        .tech-corners{position:relative;}
        .tech-corners .corner{position:absolute;width:16px;height:16px;pointer-events:none;z-index:2;}
        .tech-corners .corner-tl{top:6px;left:6px;border-top:2px solid rgba(200,164,92,0.45);border-left:2px solid rgba(200,164,92,0.45);}
        .tech-corners .corner-tr{top:6px;right:6px;border-top:2px solid rgba(200,164,92,0.45);border-right:2px solid rgba(200,164,92,0.45);}
        .tech-corners .corner-bl{bottom:6px;left:6px;border-bottom:2px solid rgba(200,164,92,0.45);border-left:2px solid rgba(200,164,92,0.45);}
        .tech-corners .corner-br{bottom:6px;right:6px;border-bottom:2px solid rgba(200,164,92,0.45);border-right:2px solid rgba(200,164,92,0.45);}

        @keyframes scan-line{0%{top:-2px;opacity:0;}8%{opacity:0.7;}92%{opacity:0.7;}100%{top:calc(100% + 2px);opacity:0;}}
        .tech-scan::after{content:'';position:absolute;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,164,92,0.55),rgba(200,164,92,0.55),transparent);animation:scan-line 3.5s ease-in-out infinite;pointer-events:none;z-index:2;}

        @keyframes pulse-border{0%,100%{border-color:rgba(200,164,92,0.2);box-shadow:0 0 0 rgba(200,164,92,0);}50%{border-color:rgba(200,164,92,0.45);box-shadow:0 0 14px rgba(200,164,92,0.04);}}
        .pulse-card{animation:pulse-border 2.5s ease-in-out infinite;}

        /* 名字卡片 */
        .name-card{
            background:linear-gradient(155deg,rgba(200,164,92,0.07) 0%,rgba(200,164,92,0.01) 100%);
            border:1px solid rgba(200,164,92,0.16);position:relative;overflow:hidden;
            transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .name-card:hover{border-color:rgba(200,164,92,0.3);background:rgba(200,164,92,0.07);box-shadow:0 16px 48px rgba(200,164,92,0.05);}
        .name-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
        .name-card.is-top{border-color:rgba(200,164,92,0.28);background:linear-gradient(155deg,rgba(200,164,92,0.1) 0%,rgba(200,164,92,0.02) 100%);}
        .name-card.is-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,164,92,0.12),transparent);}

        /* 评分圆环 */
        .score-ring{position:relative;width:76px;height:76px;flex-shrink:0;}
        .score-ring svg{transform:rotate(-90deg);}
        .score-ring .score-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:700;font-size:20px;color:var(--gold-bright);}

        /* 标记 */
        .top-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:3px;font-size:10px;background:rgba(200,164,92,0.12);color:var(--gold);border:1px solid rgba(200,164,92,0.3);}
        .rarity-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:3px;font-size:10px;}
        .rarity-极低{background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .rarity-低{background:rgba(100,181,246,0.1);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .rarity-中{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .rarity-较高{background:rgba(212,114,106,0.1);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .rarity-极高{background:rgba(196,86,74,0.12);color:#c4564a;border:1px solid rgba(196,86,74,0.25);}

        /* 重名率进度条 */
        .rarity-bar-track{height:4px;border-radius:2px;background:rgba(200,164,92,0.06);overflow:hidden;width:72px;}
        .rarity-bar-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.23,1,0.32,1);}
        .rarity-fill-极低{background:linear-gradient(90deg,rgba(129,199,132,0.4),rgba(129,199,132,0.8));}
        .rarity-fill-低{background:linear-gradient(90deg,rgba(100,181,246,0.4),rgba(100,181,246,0.8));}
        .rarity-fill-中{background:linear-gradient(90deg,rgba(232,208,154,0.4),rgba(232,208,154,0.8));}
        .rarity-fill-较高{background:linear-gradient(90deg,rgba(212,114,106,0.4),rgba(212,114,106,0.8));}
        .rarity-fill-极高{background:linear-gradient(90deg,rgba(196,86,74,0.4),rgba(196,86,74,0.8));}

        /* AI前奏 */
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
        .ai-cursor{display:inline-block;width:2px;height:1em;background:var(--gold);margin-left:2px;animation:blink 0.8s ease-in-out infinite;vertical-align:text-bottom;}

        .ai-step{display:flex;align-items:flex-start;gap:10px;opacity:0;transform:translateY(6px);transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .ai-step.visible{opacity:1;transform:translateY(0);}
        .ai-step-dot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);margin-top:7px;flex-shrink:0;transition:background 0.3s;}
        .ai-step.done .ai-step-dot{background:var(--gold);}
        .ai-step-text{flex:1;font-size:12px;line-height:1.8;color:var(--text-muted);}
        .ai-step.done .ai-step-text{color:var(--text);}
        .ai-step-check{color:var(--gold);font-size:10px;margin-left:3px;opacity:0;transition:opacity 0.3s;}
        .ai-step.done .ai-step-check{opacity:1;}

        /* 前奏折叠 */
        .prelude-card{transition:max-height 0.5s cubic-bezier(0.23,1,0.32,1),padding 0.4s ease,border-color 0.4s ease;max-height:400px;overflow:hidden;}
        .prelude-card.compact{max-height:42px;padding-top:10px!important;padding-bottom:10px!important;border-color:rgba(200,164,92,0.1);animation:none;}
        .prelude-card.compact .prelude-steps{display:none;}
        .prelude-card.compact .prelude-scan{display:none;}
        .prelude-card.compact .corner{display:none;}
        .prelude-summary{display:none;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
        .prelude-card.compact .prelude-summary{display:flex;}
        .prelude-card.compact .prelude-header{margin-bottom:0;}

        /* 对比摘要条 */
        .compare-bar{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .compare-bar::-webkit-scrollbar{display:none;}
        .compare-item{flex-shrink:0;padding:10px 20px;border-right:1px solid rgba(200,164,92,0.08);text-align:center;min-width:120px;transition:all 0.3s;cursor:pointer;}
        .compare-item:last-child{border-right:none;}
        .compare-item:hover{background:rgba(200,164,92,0.05);}
        .compare-item.active{background:rgba(200,164,92,0.08);}

        /* 解锁区 */
        .unlock-section{position:relative;overflow:hidden;border-radius:6px;}
        .unlock-blur-area{filter:blur(1.5px);transition:filter 0.3s;pointer-events:none;user-select:none;}
        .unlock-overlay{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:36px;background:linear-gradient(180deg,rgba(10,8,6,0) 0%,rgba(10,8,6,0.45) 35%,rgba(10,8,6,0.92) 100%);}

        .fav-btn{color:var(--text-muted);transition:all 0.3s;cursor:pointer;}
        .fav-btn:hover{color:var(--gold);}
        .fav-btn.faved{color:var(--vermilion);}

        .seq-item{opacity:0;transform:translateY(20px);transition:all 0.6s cubic-bezier(0.23,1,0.32,1);}
        .seq-item.seq-visible{opacity:1;transform:translateY(0);}

        .name-card-enter{opacity:0;transform:translateY(24px) scale(0.97);transition:all 0.55s cubic-bezier(0.23,1,0.32,1);}
        .name-card-enter.revealed{opacity:1;transform:translateY(0) scale(1);}

        .toast{position:fixed;top:24px;right:24px;z-index:9999;padding:14px 22px;background:rgba(200,164,92,0.12);backdrop-filter:blur(12px);border:1px solid rgba(200,164,92,0.22);color:var(--text);font-size:13px;border-radius:6px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
        .toast.show{transform:translateX(0);}

        @media(max-width:767px){
            .score-ring{width:56px;height:56px;}
            .score-ring .score-text{font-size:14px;}
            .compare-item{min-width:90px;padding:8px 12px;}
        }

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
    </style>
</head>
<body>

<canvas id="inkCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<!-- 导航栏 -->
<nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(10,8,6,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,164,92,0.06);">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">
            <a href="home.html" class="flex items-center gap-2.5 group">
                <svg width="22" height="22" viewBox="0 0 100 100" class="transition-transform duration-700 group-hover:rotate-180"><circle cx="50" cy="50" r="48" fill="none" stroke="rgba(200,164,92,0.3)" stroke-width="1.5"/><path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(200,164,92,0.55)"/><path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.12)"/><circle cx="50" cy="26" r="5.5" fill="rgba(232,224,212,0.15)"/><circle cx="50" cy="74" r="5.5" fill="rgba(200,164,92,0.55)"/></svg>
                <span class="font-serif font-bold text-sm tracking-[0.2em]" style="color:var(--gold-bright);">天衍</span>
            </a>
            <div class="flex items-center gap-4 text-[12px]">
                <span class="hidden md:inline" style="color:var(--text-muted);">AI起名结果</span>
                <span class="hidden md:inline" style="color:rgba(200,164,92,0.15);">|</span>
                <a href="name-preference.html" class="nav-link text-[12px]">修改偏好</a>
            </div>
        </div>
    </div>
</nav>

<!-- 主内容 -->
<main class="relative px-6" style="z-index:1;padding-top:76px;padding-bottom:60px;">
<div class="max-w-3xl mx-auto">

    <!-- 进度条 -->
    <div class="flex items-start justify-center gap-0 mb-6 px-4 seq-item" data-seq-delay="0" style="max-width:400px;margin-left:auto;margin-right:auto;">
        <div class="progress-node"><div class="progress-dot completed"></div><span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">输入</span></div>
        <div class="progress-connector completed" style="margin-top:14px;"></div>
        <div class="progress-node"><div class="progress-dot completed"></div><span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">排盘</span></div>
        <div class="progress-connector completed" style="margin-top:14px;"></div>
        <div class="progress-node"><div class="progress-dot completed"></div><span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">偏好</span></div>
        <div class="progress-connector completed" style="margin-top:14px;"></div>
        <div class="progress-node"><div class="progress-dot active"></div><span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">结果</span></div>
    </div>

    <!-- 信息回显条 -->
    <div class="seq-item rounded-sm px-6 py-3 mb-10 flex flex-wrap items-center justify-center gap-x-5 gap-y-2 text-[13px]" data-seq-delay="50" style="background:rgba(200,164,92,0.03);border:1px solid rgba(200,164,92,0.08);" id="infoRecap"></div>

    <!-- ============================================================ -->
    <!-- 章节标题：居中全宽 -->
    <!-- ============================================================ -->
    <div class="seq-item text-center mb-8" data-seq-delay="100">
        <div class="font-serif text-4xl md:text-5xl font-bold tracking-[0.15em] mb-3 glow-gold-strong" style="color:var(--gold-bright);">柒</div>
        <h2 class="font-serif text-2xl md:text-3xl font-bold tracking-wider mb-2" style="color:var(--text);">良名推荐</h2>
        <p class="font-serif text-sm tracking-wider mb-3" style="color:var(--text-muted);font-weight:300;">天机衍万象，一名定乾坤</p>
        <div class="gold-line max-w-[60px] mx-auto mb-3"></div>
        <p class="text-xs" style="color:var(--text-muted);">AI基于八字命盘与您的偏好推演而得，重名率越低越独特</p>
    </div>

    <!-- AI前奏卡片 -->
    <div class="seq-item tech-corners tech-scan pulse-card prelude-card rounded-sm p-4 md:p-5 mb-5" data-seq-delay="200" id="aiPrelude" style="border:1px solid rgba(200,164,92,0.22);background:linear-gradient(160deg,rgba(200,164,92,0.05) 0%,rgba(200,164,92,0.01) 100%);">
        <span class="corner corner-tl"></span><span class="corner corner-tr"></span>
        <span class="corner corner-bl"></span><span class="corner corner-br"></span>
        <div class="prelude-header flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full flex items-center justify-center" style="background:rgba(200,164,92,0.1);border:1px solid rgba(200,164,92,0.2);"><i class="fas fa-microchip text-[10px]" style="color:var(--gold);"></i></div>
                <span class="font-serif text-xs font-semibold tracking-wider" style="color:var(--gold-bright);">AI 推衍过程</span>
                <span class="text-[10px] tracking-wider" style="color:var(--text-muted);" id="aiStatus">分析中...</span>
            </div>
            <button class="btn-ghost px-3 py-1 rounded-sm" id="skipBtn" onclick="skipAI()" style="display:none;"><i class="fas fa-forward mr-1 text-[9px]"></i>跳过</button>
        </div>
        <div class="prelude-steps space-y-2" id="aiSteps"></div>
        <div class="prelude-summary"><i class="fas fa-check-circle text-[10px]" style="color:var(--gold);"></i><span id="aiSummaryText"></span></div>
    </div>

    <!-- 对比摘要条 -->
    <div class="seq-item rounded-sm mb-5 overflow-hidden" data-seq-delay="0" id="compareBar" style="display:none;border:1px solid rgba(200,164,92,0.08);background:rgba(200,164,92,0.02);">
        <div class="compare-bar" id="compareBarInner"></div>
    </div>

    <!-- 名字卡片列表 -->
    <div class="space-y-4" id="nameCardList"></div>

    <!-- ============================================================ -->
    <!-- 捌·解锁区 -->
    <!-- ============================================================ -->
    <section class="mt-12 mb-10" id="unlockSection" style="opacity:0;">
        <div class="text-center mb-6">
            <div class="font-serif text-3xl font-bold tracking-[0.15em] mb-1.5 glow-gold" style="color:var(--gold-bright);">捌</div>
            <h3 class="font-serif text-xl font-bold tracking-wider mb-1" style="color:var(--text);">更多良名</h3>
            <p class="text-[11px]" style="color:var(--text-muted);">解锁完整方案，获取深度解析与专家点评</p>
        </div>
        <div class="unlock-section" style="border:1px solid rgba(200,164,92,0.12);">
            <div class="unlock-blur-area p-4" id="unlockBlurContent"></div>
            <div class="unlock-overlay">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas fa-lock text-xs" style="color:var(--gold);"></i>

    }

    var vis = [], lck = [];
    for (var k = 0; k < scored.length; k++) {

            surname: surname, given: scored[k].entry.given, fullName: surname + scored[k].entry.given,

    while (vis.length < 5) { var fb = namePool[vis.length % namePool.length]; vis.push({ surname:surname, given:fb.given, fullName:surname+fb.given, wx:fb.wx, style:fb.style, source:fb.source, meaning:fb.meaning, poem:fb.poem, pinyin:fb.pinyin, score:fb.baseScore, matchCount:0, advantage:fb.advantage, wxBenefit:fb.wxBenefit, rarity:calcRarity(fb.given) }); }

}

        var step = document.createElement('div');
        step.className = 'ai-step visible done';
        step.innerHTML = '<div class="ai-step-dot"></div><div class="ai-step-text"><i class="fas ' + aiLines[i].icon + ' text-[9px] mr-1" style="color:var(--gold-dim);"></i>' + aiLines[i].text + '</div><span class="ai-step-check"><i class="fas fa-check"></i></span>';
        container.appendChild(step);
    }
    document.getElementById('aiStatus').textContent = '完成';
    document.getElementById('aiStatus').style.color = 'var(--gold)';
    document.getElementById('skipBtn').style.display = 'none';
    setTimeout(function() {
        document.getElementById('aiPrelude').classList.add('compact');
        document.getElementById('aiSummaryText').textContent = '喜用' + xiList.join('、') + ' · 筛选自12,800字 · 排序完成';
    }, 150);
    setTimeout(revealCards, 400);
}

/* ================================================================
   名字卡片
   ================================================================ */
function createScoreRing(score) {
    var r = 30, circ = 2 * Math.PI * r;
    var filled = (score / 100) * circ;
    var sc = score >= 93 ? 'var(--gold)' : (score >= 88 ? '#e8d09a' : 'var(--text-muted)');
    return '<div class="score-ring"><svg width="76" height="76" viewBox="0 0 76 76"><circle cx="38" cy="38" r="' + r + '" fill="none" stroke="rgba(200,164,92,0.08)" stroke-width="3"/><circle cx="38" cy="38" r="' + r + '" fill="none" stroke="' + sc + '" stroke-width="3" stroke-dasharray="' + filled.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-linecap="round"/></svg><span class="score-text glow-score">' + score + '</span></div>';
}

function renderNameCard(n, idx, isTop) {
    var tc = isTop ? ' is-top' : '';
    var tb = isTop ? '<span class="top-badge"><i class="fas fa-star text-[7px]"></i> 命理最优</span>' : '';
    var topR = isTop ? '<div class="text-[10px] mt-0.5" style="color:var(--text-muted);">喜用神' + (n.matchCount >= 2 ? '双匹配' : '匹配') + ' · 五行补益最强</div>' : '';
    var wxTags = '';
    for (var i = 0; i < n.wx.length; i++) wxTags += '<span class="wx-tag wx-' + n.wx[i] + '" style="font-size:10px;padding:2px 8px;"><i class="fas ' + wxIcons[n.wx[i]] + '" style="font-size:7px;"></i> ' + n.wx[i] + '</span> ';
    var matchTag = n.matchCount > 0 ? '<span class="text-[9px] px-1.5 py-0.5 rounded" style="background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.2);">喜用匹配</span>' : '';
    var isFav = isFaved(idx);

    var h = '<div class="name-card name-card-enter rounded-sm p-5 md:p-6' + tc + '" id="nameCard' + idx + '">';
    h += '<div class="flex items-start gap-5 md:gap-6">';
    /* 评分环 */
    h += '<div class="flex flex-col items-center gap-1 pt-1">' + createScoreRing(n.score) + '</div>';
    /* 内容 */
    h += '<div class="flex-1 min-w-0">';
    /* 第一行：名字 + 标签 */
    h += '<div class="flex items-center gap-2.5 mb-1 flex-wrap"><span class="font-serif text-2xl md:text-3xl font-bold tracking-[0.15em]" style="color:var(--gold-bright);">' + n.fullName + '</span>' + tb + '<span class="rarity-badge rarity-' + n.rarity.level + '"><i class="fas fa-fingerprint text-[7px]"></i> 重名' + n.rarity.level + '</span></div>';
    h += topR;
    h += '<div class="text-[11px] mb-2.5 mt-1" style="color:var(--text-muted);">' + n.pinyin + ' · ' + n.style + ' · 出' + n.source + '</div>';
    /* 释义 */
    h += '<p class="text-[13px] mb-3 font-serif leading-[1.85]" style="color:var(--text);">"' + n.meaning + '"</p>';
    /* 五行 + 优势 */
    h += '<div class="space-y-1.5 mb-3">';
    h += '<div class="flex items-center gap-2 flex-wrap"><span class="text-[10px]" style="color:var(--text-muted);">五行补益</span>' + wxTags + matchTag + '<span class="text-[10px]" style="color:var(--text-muted);">' + n.wxBenefit + '</span></div>';
    h += '<div class="flex items-center gap-2"><span class="text-[10px]" style="color:var(--text-muted);">核心优势</span><span class="text-[10px]" style="color:var(--text);">' + n.advantage + '</span></div>';
    h += '</div>';
    /* 重名率 */
    h += '<div class="flex items-center gap-3 mb-3">';
    h += '<span class="text-[10px]" style="color:var(--text-muted);">重名率</span>';
    h += '<div class="rarity-bar-track"><div class="rarity-bar-fill rarity-fill-' + n.rarity.level + '" style="width:0;" data-target="' + n.rarity.barPct + '"></div></div>';
    h += '<span class="rarity-badge rarity-' + n.rarity.level + '" style="font-size:9px;padding:1px 7px;">' + n.rarity.level + '</span>';
    h += '<span class="text-[10px]" style="color:var(--text-muted);">全国约 ' + n.rarity.count.toLocaleString() + ' 人</span>';
    h += '</div>';
    /* 操作 */
    h += '<div class="flex items-center gap-5">';
    h += '<button class="text-[11px] font-serif tracking-wider" style="color:var(--gold);" onclick="goToDetail(' + idx + ')"><i class="fas fa-arrow-right mr-1 text-[9px]"></i>查看详情</button>';
    h += '<button class="text-[11px]" style="color:var(--text-muted);" onclick="copyName(\'' + n.fullName + '\')"><i class="fas fa-copy mr-1 text-[9px]"></i>复制</button>';
    h += '<button class="fav-btn text-[11px]" id="fav' + idx + '" onclick="toggleFav(' + idx + ')"><i class="' + (isFav ? 'fas' : 'far') + ' fa-heart mr-1 text-[9px]"></i>' + (isFav ? '已收藏' : '收藏') + '</button>';
    h += '</div>';
    h += '</div></div></div>';
    return h;
}

function revealCards() {
    /* 对比条 */
    var bar = document.getElementById('compareBar');
    var inner = document.getElementById('compareBarInner');
    bar.style.display = 'block';
    var bh = '';
    for (var i = 0; i < visibleNames.length; i++) {
        var n = visibleNames[i];
        bh += '<div class="compare-item" onclick="scrollToCard(' + i + ')">';
        bh += '<div class="font-serif text-sm font-bold tracking-wider mb-1" style="color:var(--gold-bright);">' + n.fullName + '</div>';
        bh += '<div class="flex items-center justify-center gap-1 mb-1">';
        for (var j = 0; j < n.wx.length; j++) bh += '<span class="wx-tag wx-' + n.wx[j] + '" style="font-size:8px;padding:1px 5px;">' + n.wx[j] + '</span>';
        bh += '</div>';
        bh += '<div class="flex items-center justify-center gap-2"><span class="font-serif text-xs font-bold glow-score" style="color:var(--gold-bright);">' + n.score + '</span>';
        bh += '<span class="rarity-badge rarity-' + n.rarity.level + '" style="font-size:8px;padding:1px 5px;">' + n.rarity.level + '</span></div>';
        bh += '</div>';
    }
    inner.innerHTML = bh;

    /* 卡片 */
    var list = document.getElementById('nameCardList');
    var lh = '';
    for (var k = 0; k < visibleNames.length; k++) lh += renderNameCard(visibleNames[k], k, k === 0);
    list.innerHTML = lh;
    var cards = list.querySelectorAll('.name-card-enter');
    cards.forEach(function(c, idx) { setTimeout(function() { c.classList.add('revealed'); }, idx * 180 + 60); });

    /* 重名率条动画 */
    setTimeout(animateRarityBars, 600);

    setTimeout(function() { document.getElementById('nameCardList').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200);
    setTimeout(revealUnlock, 1200);
}

function animateRarityBars() {
    document.querySelectorAll('.rarity-bar-fill').forEach(function(f) { var t = f.dataset.target; setTimeout(function() { f.style.width = t + '%'; }, 100); });
}

/* ================================================================
   解锁区
   ================================================================ */
function revealUnlock() {
    var section = document.getElementById('unlockSection');
    var blur = document.getElementById('unlockBlurContent');
    section.style.opacity = '1'; section.style.transition = 'opacity 0.6s ease';
    var h = '<div class="grid grid-cols-2 md:grid-cols-3 gap-3">';
    for (var i = 0; i < lockedNames.length; i++) {
        var n = lockedNames[i];
        var wt = '';
        for (var j = 0; j < n.wx.length; j++) wt += '<span class="wx-tag wx-' + n.wx[j] + '" style="font-size:9px;padding:1px 6px;"><i class="fas ' + wxIcons[n.wx[j]] + '" style="font-size:7px;"></i> ' + n.wx[j] + '</span> ';
        h += '<div class="rounded-sm p-4" style="background:rgba(200,164,92,0.04);border:1px solid rgba(200,164,92,0.1);">';
        h += '<div class="flex items-center gap-2 mb-1.5"><span class="font-serif text-lg font-bold tracking-wider" style="color:var(--gold-bright);">' + n.fullName + '</span>';
        h += '<span class="rarity-badge rarity-' + n.rarity.level + '" style="font-size:8px;padding:1px 5px;">' + n.rarity.level + '</span></div>';
        h += '<div class="text-[10px] mb-2" style="color:var(--text-muted);">' + n.pinyin + ' · ' + n.style + '</div>';
        h += '<div class="flex gap-1.5 mb-2">' + wt + '</div>';
        h += '<div class="flex items-center gap-2"><div class="rarity-bar-track" style="max-width:50px;"><div class="rarity-bar-fill rarity-fill-' + n.rarity.level + '" style="width:' + n.rarity.barPct + '%;"></div></div><span class="text-[9px]" style="color:var(--text-muted);">约' + n.rarity.count + '人</span></div>';
        h += '</div>';
    }
    h += '</div>';
    blur.innerHTML = h;
    var ba = document.getElementById('bottomActions');
    ba.style.opacity = '1'; ba.style.transition = 'opacity 0.6s ease';
}

/* ================================================================
   交互
   ================================================================ */
function scrollToCard(idx) {
    var card = document.getElementById('nameCard' + idx);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    var items = document.querySelectorAll('.compare-item');
    items.forEach(function(it) { it.classList.remove('active'); });
    if (items[idx]) items[idx].classList.add('active');
}

function goToDetail(idx) {
    stg.ss('tianyan_detail', JSON.stringify(visibleNames[idx]));
    location.href = 'name-detail.html';
}

function copyName(name) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(name).then(function() { showToast('已复制「' + name + '」'); }).catch(function() { fbCopy(name); });
    } else { fbCopy(name); }
}
function fbCopy(name) {
    var ta = document.createElement('textarea'); ta.value = name; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('已复制「' + name + '」'); } catch(e) { showToast('复制失败'); }
    document.body.removeChild(ta);
}

function getFavKey() { return 'tianyan_fav_' + surname; }
function getFavs() { return stg.lp(getFavKey()) || {}; }
function isFaved(idx) { var f = getFavs(); return !!f[visibleNames[idx].given]; }
function toggleFav(idx) {
    var favs = getFavs(), given = visibleNames[idx].given, btn = document.getElementById('fav' + idx);
    if (favs[given]) { delete favs[given]; btn.classList.remove('faved'); btn.innerHTML = '<i class="far fa-heart mr-1 text-[9px]"></i>收藏'; showToast('已取消收藏'); }
    else { favs[given] = true; btn.classList.add('faved'); btn.innerHTML = '<i class="fas fa-heart mr-1 text-[9px]"></i>已收藏'; showToast('已收藏「' + visibleNames[idx].fullName + '」'); }
    stg.ls(getFavKey(), JSON.stringify(favs));
}

function restartFlow() {
    stg.sr('tianyan_input'); stg.sr('tianyan_bazi'); stg.sr('tianyan_preference'); stg.sr('tianyan_results');
    location.href = 'name-input.html';
}

function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3000); }

/* ================================================================
   序列显现
   ================================================================ */
function startSeqReveal() {
    document.querySelectorAll('.seq-item').forEach(function(item) {
        var d = parseInt(item.dataset.seqDelay || '0');
        setTimeout(function() { item.classList.add('seq-visible'); }, 200 + d);
    });
}

/* ================================================================
   水墨粒子
   ================================================================ */
var canvas = document.getElementById('inkCanvas'), ctx = canvas.getContext('2d'), particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
var isMob = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
var PC = isMob ? 10 : 18;
function IP() { this.reset(); }
IP.prototype.reset = function() { this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.radius=Math.random()*(isMob?80:120)+40; this.vx=(Math.random()-0.5)*0.12; this.vy=(Math.random()-0.5)*0.08; this.baseOpacity=Math.random()*0.018+0.003; this.opacity=this.baseOpacity; this.isGold=Math.random()>0.6; this.phase=Math.random()*Math.PI*2; };
IP.prototype.update = function(t) { this.x+=this.vx; this.y+=this.vy; this.opacity=this.baseOpacity*(0.6+0.4*Math.sin(t*0.0008+this.phase)); if(this.x<-this.radius)this.x=canvas.width+this.radius; if(this.x>canvas.width+this.radius)this.x=-this.radius; if(this.y<-this.radius)this.y=canvas.height+this.radius; if(this.y>canvas.height+this.radius)this.y=-this.radius; };
IP.prototype.draw = function() { var r=Math.max(1,this.radius); var g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r); if(this.isGold){g.addColorStop(0,'rgba(200,164,92,'+this.opacity+')');g.addColorStop(1,'rgba(200,164,92,0)');}else{g.addColorStop(0,'rgba(232,224,212,'+this.opacity+')');g.addColorStop(1,'rgba(232,224,212,0)');} ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2); ctx.fill(); };
for(var pi=0;pi<PC;pi++) particles.push(new IP());
function aC(t) { ctx.clearRect(0,0,canvas.width,canvas.height); for(var i=0;i<particles.length;i++){particles[i].update(t);particles[i].draw();} requestAnimationFrame(aC); }
requestAnimationFrame(aC);

/* 启动 */
startSeqReveal();
runAIStream();
</script>
</body>
