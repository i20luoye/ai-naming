<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天衍 · 测名结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: { 50:'#f5f0e8',100:'#e8e0d4',200:'#c4b9a8',300:'#a89e8e',400:'#5c5347',500:'#3d352c',600:'#2a231c',700:'#1a1510',800:'#110e0a',900:'#0a0806' },
                    gold: { 50:'#fdf8ed',100:'#f5e6c0',200:'#e8d09a',300:'#d4b06a',400:'#c8a45c',500:'#b08830',600:'#8c6c24',700:'#6a5119',800:'#48380f',900:'#2a2008' },
                    vermilion: { DEFAULT:'#c4564a', light:'#d4726a', dark:'#a04038' },
                },
                fontFamily: { serif:['"Noto Serif SC"','serif'], sans:['"Noto Sans SC"','sans-serif'] }
            }
        }
    }
    </script>
    <style>
        :root {
            --bg:#0a0806; --gold:#c8a45c; --gold-bright:#e8d09a; --gold-dim:#8c6c24;
            --vermilion:#c4564a; --vermilion-light:#d4726a; --vermilion-dark:#a04038;
            --text:#e8e0d4; --text-muted:#a89e8e;
            --border:rgba(200,164,92,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{
            background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;
            -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
        }
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg);}
        ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}

        .gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.35;}
        .glow-gold{text-shadow:0 0 60px rgba(200,164,92,0.15),0 0 4px rgba(200,164,92,0.08);}
        .glow-gold-strong{text-shadow:0 0 40px rgba(200,164,92,0.25),0 0 80px rgba(200,164,92,0.1),0 0 6px rgba(200,164,92,0.15);}
        .glow-score{text-shadow:0 0 12px rgba(200,164,92,0.35),0 0 4px rgba(200,164,92,0.25);}

        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0806;font-weight:600;letter-spacing:0.12em;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .btn-gold::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.6s ease;}
        .btn-gold:hover::before{left:100%;}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,164,92,0.3);}

        .btn-outline{border:1px solid rgba(200,164,92,0.35);color:var(--gold);background:transparent;transition:all 0.3s ease;}
        .btn-outline:hover{background:rgba(200,164,92,0.08);border-color:var(--gold);}

        .btn-ghost{color:var(--text-muted);background:transparent;transition:all 0.3s ease;font-size:11px;}
        .btn-ghost:hover{color:var(--gold);}

        .nav-link{position:relative;color:var(--text-muted);transition:color 0.3s;}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
        .nav-link:hover{color:var(--gold);}
        .nav-link:hover::after{width:100%;}

        .wx-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:4px;font-size:12px;font-family:'Noto Serif SC',serif;}
        .wx-jin{background:rgba(232,208,154,0.12);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .wx-mu{background:rgba(129,199,132,0.12);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .wx-shui{background:rgba(100,181,246,0.12);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .wx-huo{background:rgba(212,114,106,0.12);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .wx-tu{background:rgba(212,196,160,0.12);color:#d4c4a0;border:1px solid rgba(212,196,160,0.25);}

        .analysis-card{background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);border:1px solid rgba(200,164,92,0.12);position:relative;overflow:hidden;}
        .analysis-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
        .analysis-card.card-accent-vermilion::before{background:linear-gradient(90deg,transparent,var(--vermilion),var(--gold),transparent);}

        .score-ring-hero{position:relative;width:160px;height:160px;flex-shrink:0;}
        .score-ring-hero svg{transform:rotate(-90deg);}
        .score-ring-hero .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .score-ring-hero .score-num{font-family:'Noto Serif SC',serif;font-weight:900;font-size:48px;line-height:1;}
        .score-ring-hero .score-label{font-size:11px;margin-top:4px;color:var(--text-muted);}
        .score-ring-hero .score-grade{font-size:13px;font-weight:700;margin-top:2px;}
        .ring-track{transition:stroke-dashoffset 1.8s cubic-bezier(0.23,1,0.32,1);}

        .grade-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:0.05em;}
        .grade-excellent{background:rgba(200,164,92,0.12);color:var(--gold-bright);border:1px solid rgba(200,164,92,0.3);}
        .grade-good{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .grade-fair{background:rgba(168,158,142,0.1);color:var(--text-muted);border:1px solid rgba(168,158,142,0.2);}
        .grade-poor{background:rgba(196,86,74,0.08);color:var(--vermilion-light);border:1px solid rgba(196,86,74,0.2);}

        .anchor-bar{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .anchor-bar::-webkit-scrollbar{display:none;}
        .anchor-item{flex-shrink:0;padding:8px 16px;font-size:11px;color:var(--text-muted);cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.05em;}
        .anchor-item:hover{color:var(--vermilion-light);}
        .anchor-item.active{color:var(--vermilion-light);border-bottom-color:var(--vermilion);}

        .dim-bar-track{height:6px;border-radius:3px;background:rgba(200,164,92,0.06);overflow:hidden;}
        .dim-bar-fill{height:100%;border-radius:3px;width:0;transition:width 1s cubic-bezier(0.23,1,0.32,1);}
        .dim-fill-excellent{background:linear-gradient(90deg,rgba(200,164,92,0.4),rgba(200,164,92,0.9));}
        .dim-fill-good{background:linear-gradient(90deg,rgba(232,208,154,0.3),rgba(232,208,154,0.75));}
        .dim-fill-fair{background:linear-gradient(90deg,rgba(168,158,142,0.3),rgba(168,158,142,0.6));}
        .dim-fill-poor{background:linear-gradient(90deg,rgba(196,86,74,0.3),rgba(196,86,74,0.7));}

        .char-cards-col{display:flex;flex-direction:column;align-items:center;gap:0;}
        .char-card{
            background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);
            border:1px solid rgba(200,164,92,0.14);position:relative;overflow:hidden;
            transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .char-card:hover{border-color:rgba(200,164,92,0.28);background:rgba(200,164,92,0.06);}
        .char-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
        .char-glyph{
            width:56px;height:56px;display:flex;align-items:center;justify-content:center;
            border:1px solid rgba(200,164,92,0.2);background:rgba(200,164,92,0.05);
            font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;color:var(--gold-bright);
            border-radius:4px;
        }
        .char-connector-v{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 0;}
        .char-connector-v .conn-line{width:1px;height:16px;background:linear-gradient(180deg,rgba(200,164,92,0.15),rgba(200,164,92,0.25),rgba(200,164,92,0.15));}
        .conn-arrow.sk-sheng{color:#81c784;}
        .conn-arrow.sk-ke{color:#d4726a;}
        .conn-arrow.sk-same{color:var(--text-muted);}

        .char-cards-row{display:none;align-items:center;gap:2px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;}
        .char-cards-row .char-card{padding:8px 10px;min-width:0;flex-shrink:0;}
        .char-cards-row .char-glyph{width:36px;height:36px;font-size:18px;}
        .char-cards-row .char-card-detail{display:none;}
        .char-connector-h{display:none;flex-direction:row;align-items:center;gap:1px;flex-shrink:0;}
        .char-connector-h .conn-dot{width:12px;height:1px;background:linear-gradient(90deg,rgba(200,164,92,0.15),rgba(200,164,92,0.3),rgba(200,164,92,0.15));}

        .ge-cell{text-align:center;padding:12px 8px;background:rgba(200,164,92,0.03);border:1px solid rgba(200,164,92,0.08);transition:all 0.3s;}
        .ge-cell:hover{background:rgba(200,164,92,0.06);border-color:rgba(200,164,92,0.15);}
        .ge-cell .ge-val{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--gold-bright);}
        .ge-cell .ge-name{font-size:10px;color:var(--text-muted);margin-top:2px;}
        .ge-ji{font-size:9px;padding:1px 6px;border-radius:2px;display:inline-block;margin-top:4px;}
        .ge-ji.ji-ji{background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.2);}
        .ge-ji.ji-banji{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.2);}
        .ge-ji.ji-xiong{background:rgba(196,86,74,0.08);color:#d4726a;border:1px solid rgba(196,86,74,0.2);}

        .rarity-bar-lg{height:8px;border-radius:4px;background:rgba(200,164,92,0.06);overflow:hidden;}
        .rarity-fill-lg{height:100%;border-radius:4px;width:0;transition:width 1.2s cubic-bezier(0.23,1,0.32,1);}
        .rarity-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:3px;font-size:10px;}
        .rarity-jidi{background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .rarity-di{background:rgba(100,181,246,0.1);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .rarity-zhong{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .rarity-jiaogao{background:rgba(212,114,106,0.1);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .rarity-jigao{background:rgba(196,86,74,0.12);color:#c4564a;border:1px solid rgba(196,86,74,0.25);}

        .caution-card{background:linear-gradient(155deg,rgba(196,86,74,0.04) 0%,rgba(196,86,74,0.01) 100%);border:1px solid rgba(196,86,74,0.12);position:relative;overflow:hidden;}
        .caution-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--vermilion),transparent);}

        .hero-glow{position:relative;}
        .hero-glow::after{content:'';position:absolute;inset:-60px;background:radial-gradient(ellipse at center,rgba(196,86,74,0.06) 0%,rgba(196,86,74,0.02) 40%,transparent 70%);pointer-events:none;z-index:-1;}

        .seq-item{opacity:0;transform:translateY(20px);transition:all 0.6s cubic-bezier(0.23,1,0.32,1);}
        .seq-item.seq-visible{opacity:1;transform:translateY(0);}

        #loadingOverlay{position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease,visibility 0.8s ease;}
        #loadingOverlay.loaded{opacity:0;visibility:hidden;pointer-events:none;}
        @keyframes loading-pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
        @keyframes dot-blink{0%,100%{opacity:0.2;}50%{opacity:1;}}
        @keyframes taiji-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

        .score-detail summary{list-style:none;cursor:pointer;}
        .score-detail summary::-webkit-details-marker{display:none;}
        .score-detail summary .detail-arrow{transition:transform 0.3s ease;}
        .score-detail[open] summary .detail-arrow{transform:rotate(90deg);}

        .demo-hint{background:rgba(196,86,74,0.06);border:1px solid rgba(196,86,74,0.15);border-radius:4px;padding:6px 14px;font-size:11px;color:var(--text-muted);display:inline-flex;align-items:center;gap:6px;}
        .demo-hint a{color:var(--vermilion-light);text-decoration:none;transition:color 0.3s;}
        .demo-hint a:hover{color:var(--vermilion);}

        .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(10,8,6,0.94);backdrop-filter:blur(14px);border-top:1px solid rgba(200,164,92,0.08);transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.23,1,0.32,1);}
        .bottom-bar.visible{transform:translateY(0);}

        .back-top{position:fixed;bottom:80px;right:24px;z-index:35;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(200,164,92,0.08);border:1px solid rgba(200,164,92,0.2);color:var(--gold);cursor:pointer;opacity:0;visibility:hidden;transition:all 0.3s ease;backdrop-filter:blur(8px);}
        .back-top.visible{opacity:1;visibility:visible;}
        .back-top:hover{background:rgba(200,164,92,0.15);transform:translateY(-2px);}

        .toast{position:fixed;top:24px;right:24px;z-index:9999;padding:14px 22px;background:rgba(200,164,92,0.12);backdrop-filter:blur(12px);border:1px solid rgba(200,164,92,0.22);color:var(--text);font-size:13px;border-radius:6px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
        .toast.show{transform:translateX(0);}

        @keyframes breathe{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:0.5;transform:scale(1.03);}}

        @media(max-width:767px){
            .score-ring-hero{width:120px;height:120px;}
            .score-ring-hero .score-num{font-size:36px;}
            .char-cards-col{display:none;}
            .char-cards-row{display:flex;}
            .char-connector-h{display:flex;}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
    </style>
</head>
<body>

<!-- 加载遮罩 - 修复：初始不隐藏 -->
<div id="loadingOverlay">
    <div style="position:relative;width:80px;height:80px;">
        <svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%;animation:taiji-spin 8s linear infinite;opacity:0.3;">
            <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(196,86,74,0.2)" stroke-width="0.5"/>
            <path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(196,86,74,0.4)"/>
            <path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.08)"/>
            <circle cx="50" cy="26" r="5" fill="rgba(232,224,212,0.08)"/>
            <circle cx="50" cy="74" r="5" fill="rgba(196,86,74,0.4)"/>
        </svg>
    </div>
    <div class="font-serif text-lg tracking-[0.3em] mt-8 mb-3" style="color:var(--vermilion-light);animation:loading-pulse 1.8s ease-in-out infinite;">正在评测</div>
    <div class="flex items-center gap-2 text-xs" style="color:var(--text-muted);">
        <span id="ls1" style="animation:dot-blink 1.2s ease-in-out infinite;">排八字</span>
        <span>·</span>
        <span id="ls2" style="opacity:0.25;">析五行</span>
        <span style="opacity:0.25;">·</span>
        <span id="ls3" style="opacity:0.25;">评分</span>
    </div>
</div>

<canvas id="inkCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<!-- 导航栏 -->
<nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(10,8,6,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,164,92,0.06);">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">
            <a href="home.html" class="flex items-center gap-2.5 group">
                <svg width="22" height="22" viewBox="0 0 100 100" class="transition-transform duration-700 group-hover:rotate-180"><circle cx="50" cy="50" r="48" fill="none" stroke="rgba(200,164,92,0.3)" stroke-width="1.5"/><path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(200,164,92,0.55)"/><path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.12)"/><circle cx="50" cy="26" r="5.5" fill="rgba(232,224,212,0.15)"/><circle cx="50" cy="74" r="5.5" fill="rgba(200,164,92,0.55)"/></svg>
                <span class="font-serif font-bold text-sm tracking-[0.2em]" style="color:var(--gold-bright);">天衍</span>
            </a>
            <div class="flex items-center gap-4 text-[12px]">
                <span class="hidden md:inline" style="color:var(--vermilion-light);">测名结果</span>
                <span class="hidden md:inline" style="color:rgba(200,164,92,0.15);">|</span>
                <a href="test-name.html" class="nav-link text-[12px]">重新测名</a>
            </div>
        </div>
    </div>
</nav>

<!-- 主内容 -->
<main class="relative px-6" style="z-index:1;padding-top:76px;padding-bottom:100px;">
<div class="max-w-3xl mx-auto" id="mainContent">

    <section class="seq-item text-center mb-4 hero-glow" data-seq-delay="0" id="heroSection"></section>
    <div class="seq-item text-center mb-4" data-seq-delay="30" id="demoHint" style="display:none;"></div>
    <div class="seq-item rounded-sm mb-10" data-seq-delay="60" style="border:1px solid rgba(196,86,74,0.08);background:rgba(196,86,74,0.02);">
        <div class="anchor-bar" id="anchorBar"></div>
    </div>
    <section class="seq-item mb-10" data-seq-delay="100" id="cautionSection" style="display:none;"></section>
    <section class="seq-item mb-10" data-seq-delay="200" id="wxMatchSection" data-anchor="wuxing"></section>
    <section class="seq-item mb-10" data-seq-delay="300" id="scoreSection" data-anchor="score"></section>
    <section class="seq-item mb-10" data-seq-delay="400" id="geSection" data-anchor="ge"></section>
    <section class="seq-item mb-10" data-seq-delay="500" id="raritySection" data-anchor="rarity"></section>
    <section class="seq-item mb-10" data-seq-delay="600" id="adviceSection" data-anchor="advice"></section>

    <div class="seq-item text-center py-8" data-seq-delay="700">
        <div class="gold-line max-w-[60px] mx-auto mb-5"></div>
        <p class="text-sm mb-4" style="color:var(--text-muted);">对结果不满意？让AI为您量身推演良名</p>
        <div class="flex items-center justify-center gap-4 flex-wrap">
            <a href="name-input.html" class="btn-gold px-8 py-3 rounded-sm font-serif text-[12px] tracking-[0.2em] inline-block">AI 起名</a>
            <a href="test-name.html" class="btn-outline px-8 py-3 rounded-sm text-[12px] font-serif tracking-wider inline-block">测其他名字</a>
        </div>
    </div>
</div>
</main>

<div class="bottom-bar" id="bottomBar">
    <div class="max-w-3xl mx-auto px-6 py-3">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-2 min-w-0">
                <span class="font-serif text-base font-bold tracking-wider truncate" style="color:var(--gold-bright);" id="barName">—</span>
                <span class="text-xs shrink-0" style="color:var(--text-muted);" id="barScore">—</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button class="btn-ghost px-2 py-2 rounded-sm" onclick="copyResult()" aria-label="复制"><i class="fas fa-copy"></i></button>
                <button class="btn-outline px-4 py-2 rounded-sm text-[11px] font-serif tracking-wider" onclick="location.href='test-name.html'"><i class="fas fa-redo mr-1.5 text-[9px]"></i>重测</button>
                <button class="btn-gold px-5 py-2 rounded-sm text-[11px] font-serif tracking-wider" onclick="location.href='name-input.html'"><i class="fas fa-pen-nib mr-1.5 text-[9px]"></i>AI起名</button>
            </div>
        </div>

    var waiGe=Math.max(1,zongGe-renGe+1);
    var jiCount=0;
    var details=[];
    var ges=[tianGe,renGe,diGe,waiGe,zongGe];
    var names=['天格','人格','地格','外格','总格'];
    ges.forEach(function(v,idx){
        var d=v%10;
        if(d===1||d===2){jiCount++;details.push({label:names[idx]+'尾'+d+' 吉',val:'吉'});}
        else if(d===3||d===4){jiCount+=0.5;details.push({label:names[idx]+'尾'+d+' 半吉',val:'半吉'});}
        else{details.push({label:names[idx]+'尾'+d+' 凶',val:'凶'});}
    });
    var score=Math.round(55+jiCount*8+simpleHash(fullName+'scwg')%6);
    return{score:Math.min(99,Math.max(40,score)),details:details};
}

function calcYinyunScore(){
    var score=70,details=[];
    details.push({label:'基础分',val:70});
    var hasPing=allTones.some(function(t){return t<=2;});
    var hasZe=allTones.some(function(t){return t>=3;});
    if(hasPing&&hasZe){score+=15;details.push({label:'平仄相间',val:'+15'});}
    else{score+=3;details.push({label:'声调单一',val:'+3'});}
    var openVowels=['a','o','e'];
    var openCount=0;
    allPinyin.forEach(function(py){
        if(!py)return;
        var lower=py.toLowerCase();
        for(var i=0;i<openVowels.length;i++){if(lower.indexOf(openVowels[i])>=0){openCount++;break;}}
    });
    if(openCount>=allChars.length-1){score+=8;details.push({label:'开口音为主',val:'+8'});}
    else if(openCount>0){score+=5;details.push({label:'开闭交替',val:'+5'});}
    else{details.push({label:'闭口音为主',val:'+0'});}
    var adj=simpleHash(fullName+'yy')%5;score+=adj;
    if(adj!==0)details.push({label:'微调',val:(adj>0?'+':'')+adj});
    return{score:Math.min(99,Math.max(45,score)),details:details};
}

function calcRarityScore(){
    var charFreq={'涵':0.55,'泽':0.60,'清':0.50,'源':0.40,'沁':0.20,'兰':0.45,'潆':0.04,'月':0.55,'澄':0.25,'宁':0.40,'梓':0.35,'桐':0.22,'栩':0.15,'然':0.45,'芷':0.22,'萱':0.30,'晏':0.10,'毓':0.12,'辰':0.50,'瑾':0.28,'瑜':0.30,'锦':0.40,'瑞':0.50,'钰':0.30,'铭':0.35,'煜':0.35,'昕':0.30,'晖':0.22,'煦':0.08,'风':0.55,'宇':0.60,'坤':0.30,'如':0.35};
    var surFreq={'张':0.9,'王':0.9,'李':0.85,'刘':0.8,'陈':0.8};
    var f1=charFreq[given.charAt(0)]||0.3,f2=given.length>1?(charFreq[given.charAt(1)]||0.3):0.3;
    var combined=(f1+f2)/2;var sf=surFreq[surname]||0.5;var rate=combined*sf;
    var level,interval,score;
    if(rate<0.1){level='极低';interval='约0.01%-0.05%';score=95;}
    else if(rate<0.2){level='低';interval='约0.05%-0.2%';score=85;}
    else if(rate<0.35){level='中';interval='约0.2%-0.5%';score=65;}
    else if(rate<0.5){level='较高';interval='约0.5%-1%';score=45;}
    else{level='极高';interval='约1%以上';score=30;}
    score=Math.min(99,Math.max(25,score+simpleHash(fullName+'rar')%5));
    return{score:score,level:level,interval:interval};
}

    try{document.execCommand('copy');showToast('结果已复制到剪贴板');}catch(e){showToast('复制失败，请手动复制');}

}

/* ================================================================
   墨迹背景 Canvas
   ================================================================ */
(function(){
    var canvas=document.getElementById('inkCanvas');
    if(!canvas) return;
    var ctx=canvas.getContext('2d');
    var W,H,dpr;
    function resize(){
        dpr=window.devicePixelRatio||1;
        W=window.innerWidth;H=window.innerHeight;
        canvas.width=W*dpr;canvas.height=H*dpr;
        canvas.style.width=W+'px';canvas.style.height=H+'px';
        ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    resize();
    window.addEventListener('resize',resize);

    var blobs=[];
    for(var i=0;i<5;i++){
        blobs.push({
            x:Math.random()*W, y:Math.random()*H,
            r:120+Math.random()*200,
            vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.1,
            opacity:0.015+Math.random()*0.02,
            hue:Math.random()>0.5?'196,86,74':'200,164,92'
        });
    }

    function draw(){
        ctx.clearRect(0,0,W,H);
        for(var i=0;i<blobs.length;i++){
            var b=blobs[i];
            b.x+=b.vx; b.y+=b.vy;
            if(b.x<-b.r) b.x=W+b.r;
            if(b.x>W+b.r) b.x=-b.r;
            if(b.y<-b.r) b.y=H+b.r;
            if(b.y>H+b.r) b.y=-b.r;
            var r=Math.max(1,b.r);
            var grad=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
            grad.addColorStop(0,'rgba('+b.hue+','+b.opacity+')');
            grad.addColorStop(1,'rgba('+b.hue+',0)');
            ctx.fillStyle=grad;
            ctx.beginPath();
            ctx.arc(b.x,b.y,r,0,Math.PI*2);
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

function initPage(){
    /* 序列动画 */
    var items=document.querySelectorAll('.seq-item');
    items.forEach(function(item){
        var delay=parseInt(item.getAttribute('data-seq-delay'))||0;
        setTimeout(function(){item.classList.add('seq-visible');},delay+100);
    });

    /* 圆环动画 */
    setTimeout(function(){
        var ring=document.getElementById('heroRing');
        if(ring){
            var filled=ring.getAttribute('data-filled');
            ring.style.strokeDashoffset=filled;
        }
    },400);

    /* 评分条动画 */
    setTimeout(function(){
        document.querySelectorAll('.dim-bar-fill').forEach(function(bar){
            var w=bar.getAttribute('data-width');
            if(w) bar.style.width=w;
        });
        document.querySelectorAll('.rarity-fill-lg').forEach(function(bar){
            var w=bar.getAttribute('data-width');
            if(w) bar.style.width=w;
        });
    },800);

    /* 滚动监听 */
    var bottomBar=document.getElementById('bottomBar');
    var backTop=document.getElementById('backTop');
    var anchorItems=document.querySelectorAll('.anchor-item');
    var sections=['wxMatchSection','scoreSection','geSection','raritySection','adviceSection'];

    window.addEventListener('scroll',function(){
        var sy=window.scrollY;

        /* 底部栏显示 */
        if(sy>400) bottomBar.classList.add('visible');
        else bottomBar.classList.remove('visible');

        /* 回到顶部按钮 */
        if(sy>600) backTop.classList.add('visible');
        else backTop.classList.remove('visible');

        /* 锚点高亮 */
        var current='';
        for(var i=0;i<sections.length;i++){
            var sec=document.getElementById(sections[i]);
            if(sec&&sec.getBoundingClientRect().top<=120) current=sections[i];
        }
        anchorItems.forEach(function(item){
            var target=item.getAttribute('data-target');
            if(target===current) item.classList.add('active');
            else item.classList.remove('active');
        });
    },{passive:true});
}
