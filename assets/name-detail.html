<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天衍 · 名字详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: { 50:'#f5f0e8',100:'#e8e0d4',200:'#c4b9a8',300:'#a89e8e',400:'#5c5347',500:'#3d352c',600:'#2a231c',700:'#1a1510',800:'#110e0a',900:'#0a0806' },
                    gold: { 50:'#fdf8ed',100:'#f5e6c0',200:'#e8d09a',300:'#d4b06a',400:'#c8a45c',500:'#b08830',600:'#8c6c24',700:'#6a5119',800:'#48380f',900:'#2a2008' },
                    vermilion: { DEFAULT:'#c4564a', light:'#d4726a', dark:'#a04038' },
                },
                fontFamily: { serif:['"Noto Serif SC"','serif'], sans:['"Noto Sans SC"','sans-serif'] }
            }
        }
    }
    </script>
    <style>
        :root {
            --bg:#0a0806; --gold:#c8a45c; --gold-bright:#e8d09a; --gold-dim:#8c6c24;
            --vermilion:#c4564a; --text:#e8e0d4; --text-muted:#a89e8e;
            --border:rgba(200,164,92,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{
            background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;
            -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
        }
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg);}
        ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}

        .gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.35;}
        .glow-gold-strong{text-shadow:0 0 40px rgba(200,164,92,0.25),0 0 80px rgba(200,164,92,0.1),0 0 6px rgba(200,164,92,0.15);}
        .glow-score{text-shadow:0 0 12px rgba(200,164,92,0.35),0 0 4px rgba(200,164,92,0.25);}

        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0806;font-weight:600;letter-spacing:0.12em;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .btn-gold::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.6s ease;}
        .btn-gold:hover::before{left:100%;}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,164,92,0.3);}

        .btn-outline{border:1px solid rgba(200,164,92,0.35);color:var(--gold);background:transparent;transition:all 0.3s ease;}
        .btn-outline:hover{background:rgba(200,164,92,0.08);border-color:var(--gold);}

        .btn-ghost{color:var(--text-muted);background:transparent;transition:all 0.3s ease;}
        .btn-ghost:hover{color:var(--gold);}
        .btn-ghost:disabled{opacity:0.2;cursor:not-allowed;color:var(--text-muted)!important;}

        .nav-link{position:relative;color:var(--text-muted);transition:color 0.3s;}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
        .nav-link:hover{color:var(--gold);}
        .nav-link:hover::after{width:100%;}

        .wx-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:4px;font-size:12px;font-family:'Noto Serif SC',serif;}
        .wx-金{background:rgba(232,208,154,0.12);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .wx-木{background:rgba(129,199,132,0.12);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .wx-水{background:rgba(100,181,246,0.12);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .wx-火{background:rgba(212,114,106,0.12);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .wx-土{background:rgba(212,196,160,0.12);color:#d4c4a0;border:1px solid rgba(212,196,160,0.25);}

        .analysis-card{background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);border:1px solid rgba(200,164,92,0.12);position:relative;overflow:hidden;}
        .analysis-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

        /* 英雄区光晕 */
        .hero-glow{position:relative;}
        .hero-glow::after{content:'';position:absolute;inset:-60px;background:radial-gradient(ellipse at center,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.02) 40%,transparent 70%);pointer-events:none;z-index:-1;}

        /* 大评分圆环 */
        .score-ring-lg{position:relative;width:120px;height:120px;flex-shrink:0;}
        .score-ring-lg svg{transform:rotate(-90deg);}
        .score-ring-lg .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .score-ring-lg .score-num{font-family:'Noto Serif SC',serif;font-weight:900;font-size:36px;color:var(--gold-bright);line-height:1;}
        .score-ring-lg .score-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
        .score-ring-lg .score-grade{font-size:11px;font-weight:600;margin-top:1px;}

        .ring-animated{stroke-dashoffset:var(--circ);transition:stroke-dashoffset 1.5s cubic-bezier(0.23,1,0.32,1);}
        .ring-animated.animate{stroke-dashoffset:0;}

        /* 锚点导航 */
        .anchor-bar{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .anchor-bar::-webkit-scrollbar{display:none;}
        .anchor-item{flex-shrink:0;padding:8px 16px;font-size:11px;color:var(--text-muted);cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.05em;}
        .anchor-item:hover{color:var(--gold);}
        .anchor-item.active{color:var(--gold-bright);border-bottom-color:var(--gold);}

        /* 六维评分条 */
        .dim-bar-track{height:6px;border-radius:3px;background:rgba(200,164,92,0.06);overflow:hidden;}
        .dim-bar-fill{height:100%;border-radius:3px;width:0;transition:width 1s cubic-bezier(0.23,1,0.32,1);}
        .dim-fill-high{background:linear-gradient(90deg,rgba(200,164,92,0.4),rgba(200,164,92,0.85));}
        .dim-fill-mid{background:linear-gradient(90deg,rgba(232,208,154,0.3),rgba(232,208,154,0.7));}
        .dim-fill-low{background:linear-gradient(90deg,rgba(168,158,142,0.3),rgba(168,158,142,0.6));}

        /* 评分分级图例 */
        .grade-legend span{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 6px;border-radius:2px;}
        .grade-legend .g-excellent{background:rgba(200,164,92,0.1);color:var(--gold);border:1px solid rgba(200,164,92,0.2);}
        .grade-legend .g-good{background:rgba(232,208,154,0.08);color:#e8d09a;border:1px solid rgba(232,208,154,0.15);}
        .grade-legend .g-fair{background:rgba(168,158,142,0.08);color:var(--text-muted);border:1px solid rgba(168,158,142,0.15);}

        /* 字卡片 */
        .char-card{
            background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);
            border:1px solid rgba(200,164,92,0.14);position:relative;overflow:hidden;
            transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .char-card:hover{border-color:rgba(200,164,92,0.28);background:rgba(200,164,92,0.06);}
        .char-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

        .char-glyph{
            width:64px;height:64px;display:flex;align-items:center;justify-content:center;
            border:1px solid rgba(200,164,92,0.2);background:rgba(200,164,92,0.05);
            font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--gold-bright);
        }

        /* 字卡连接线 */
        .char-connector{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 0;}
        .char-connector .conn-line{width:1px;height:20px;background:linear-gradient(180deg,rgba(200,164,92,0.15),rgba(200,164,92,0.25),rgba(200,164,92,0.15));}
        .char-connector .conn-arrow{font-size:8px;line-height:1;}
        .conn-arrow.sk-sheng{color:#81c784;}
        .conn-arrow.sk-ke{color:#d4726a;}
        .conn-arrow.sk-same{color:var(--text-muted);}
        .conn-arrow.sk-neutral{color:var(--text-muted);opacity:0.5;}

        /* 生克关系 */
        .shengke-line{display:flex;align-items:center;gap:4px;font-size:10px;white-space:nowrap;}
        .sk-arrow-sheng{color:#81c784;}
        .sk-arrow-ke{color:#d4726a;}
        .sk-arrow-same{color:var(--text-muted);}
        .sk-arrow-neutral{color:var(--text-muted);opacity:0.6;}

        /* 诗词引用 */
        .poem-block{position:relative;padding-left:20px;border-left:2px solid rgba(200,164,92,0.2);}
        .poem-block::before{content:'\201C';position:absolute;top:-8px;left:6px;font-family:'Noto Serif SC',serif;font-size:40px;line-height:1;color:rgba(200,164,92,0.12);pointer-events:none;}

        /* 三才五格 */
        .ge-cell{text-align:center;padding:12px 8px;background:rgba(200,164,92,0.03);border:1px solid rgba(200,164,92,0.08);transition:all 0.3s;}
        .ge-cell:hover{background:rgba(200,164,92,0.06);border-color:rgba(200,164,92,0.15);}
        .ge-cell .ge-val{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--gold-bright);}
        .ge-cell .ge-name{font-size:10px;color:var(--text-muted);margin-top:2px;}
        .ge-ji{font-size:9px;padding:1px 6px;border-radius:2px;display:inline-block;margin-top:4px;}
        .ge-ji.吉{background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.2);}
        .ge-ji.半吉{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.2);}
        .ge-ji.凶{background:rgba(196,86,74,0.08);color:#d4726a;border:1px solid rgba(196,86,74,0.2);}

        /* 重名率 */
        .rarity-bar-lg{height:8px;border-radius:4px;background:rgba(200,164,92,0.06);overflow:hidden;}
        .rarity-fill-lg{height:100%;border-radius:4px;width:0;transition:width 1.2s cubic-bezier(0.23,1,0.32,1);}
        .rarity-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:3px;font-size:10px;}
        .rarity-极低{background:rgba(129,199,132,0.1);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .rarity-低{background:rgba(100,181,246,0.1);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .rarity-中{background:rgba(232,208,154,0.1);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .rarity-较高{background:rgba(212,114,106,0.1);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .rarity-极高{background:rgba(196,86,74,0.12);color:#c4564a;border:1px solid rgba(196,86,74,0.25);}

        .pct-bar-track{height:4px;border-radius:2px;background:rgba(200,164,92,0.06);overflow:hidden;}
        .pct-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(0.23,1,0.32,1) 0.3s;}

        /* 注意事项 */
        .caution-card{background:linear-gradient(155deg,rgba(196,86,74,0.04) 0%,rgba(196,86,74,0.01) 100%);border:1px solid rgba(196,86,74,0.12);position:relative;overflow:hidden;}
        .caution-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--vermilion),transparent);}

        /* 确认弹窗 */
        .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(10,8,6,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.4s ease;}
        .modal-overlay.show{opacity:1;visibility:visible;}
        .modal-box{transform:scale(0.92) translateY(20px);transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .modal-overlay.show .modal-box{transform:scale(1) translateY(0);}

        /* 底部操作栏 */
        .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(10,8,6,0.94);backdrop-filter:blur(14px);border-top:1px solid rgba(200,164,92,0.08);transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.23,1,0.32,1);}
        .bottom-bar.visible{transform:translateY(0);}

        /* 回到顶部 */
        .back-top{position:fixed;bottom:80px;right:24px;z-index:35;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(200,164,92,0.08);border:1px solid rgba(200,164,92,0.2);color:var(--gold);cursor:pointer;opacity:0;visibility:hidden;transition:all 0.3s ease;backdrop-filter:blur(8px);}
        .back-top.visible{opacity:1;visibility:visible;}
        .back-top:hover{background:rgba(200,164,92,0.15);transform:translateY(-2px);}

        .seq-item{opacity:0;transform:translateY(20px);transition:all 0.6s cubic-bezier(0.23,1,0.32,1);}
        .seq-item.seq-visible{opacity:1;transform:translateY(0);}

        @keyframes node-pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,164,92,0.35);}50%{box-shadow:0 0 0 10px rgba(200,164,92,0);}}
        .btn-pulse{animation:node-pulse 2s ease-in-out infinite;}

        .toast{position:fixed;top:24px;right:24px;z-index:9999;padding:14px 22px;background:rgba(200,164,92,0.12);backdrop-filter:blur(12px);border:1px solid rgba(200,164,92,0.22);color:var(--text);font-size:13px;border-radius:6px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
        .toast.show{transform:translateX(0);}

        @media(max-width:767px){
            .score-ring-lg{width:96px;height:96px;}
            .score-ring-lg .score-num{font-size:28px;}
            .char-glyph{width:52px;height:52px;font-size:24px;}
            .char-connector .conn-line{height:14px;}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
    </style>
</head>
<body>

<canvas id="inkCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<!-- 导航栏 -->
<nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(10,8,6,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,164,92,0.06);">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">
            <a href="home.html" class="flex items-center gap-2.5 group">
                <svg width="22" height="22" viewBox="0 0 100 100" class="transition-transform duration-700 group-hover:rotate-180"><circle cx="50" cy="50" r="48" fill="none" stroke="rgba(200,164,92,0.3)" stroke-width="1.5"/><path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(200,164,92,0.55)"/><path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.12)"/><circle cx="50" cy="26" r="5.5" fill="rgba(232,224,212,0.15)"/><circle cx="50" cy="74" r="5.5" fill="rgba(200,164,92,0.55)"/></svg>
                <span class="font-serif font-bold text-sm tracking-[0.2em]" style="color:var(--gold-bright);">天衍</span>
            </a>
            <div class="flex items-center gap-4 text-[12px]">
                <span class="hidden md:inline" style="color:var(--text-muted);">名字详情</span>
                <span class="hidden md:inline" style="color:rgba(200,164,92,0.15);">|</span>
                <a href="name-result.html" class="nav-link text-[12px]">返回结果</a>
            </div>
        </div>
    </div>
</nav>

<!-- 主内容 -->
<main class="relative px-6" style="z-index:1;padding-top:76px;padding-bottom:100px;">
<div class="max-w-3xl mx-auto" id="mainContent">

    <!-- 英雄区 -->
    <section class="seq-item text-center mb-6 hero-glow" data-seq-delay="0" id="heroSection"></section>

    <!-- 锚点导航 -->
    <div class="seq-item rounded-sm mb-10" data-seq-delay="50" style="border:1px solid rgba(200,164,92,0.06);background:rgba(200,164,92,0.02);">
        <div class="anchor-bar" id="anchorBar"></div>
    </div>

    <!-- 六维评分 -->
    <section class="seq-item mb-10" data-seq-delay="100" id="dimSection" data-anchor="wuxing-score"></section>

    <!-- 注意事项 -->
    <section class="seq-item mb-10" data-seq-delay="150" id="cautionSection" data-anchor="caution" style="display:none;"></section>

    <!-- 五行补益 -->
    <section class="seq-item mb-10" data-seq-delay="200" id="wxSection" data-anchor="wuxing"></section>

    <!-- 诗词出处 -->
    <section class="seq-item mb-10" data-seq-delay="300" id="poemSection" data-anchor="poem"></section>

    <!-- 三才五格 + 音韵 -->
    <section class="seq-item mb-10" data-seq-delay="400" id="geSection" data-anchor="ge"></section>

    <!-- 重名与独特性 -->
    <section class="seq-item mb-10" data-seq-delay="500" id="raritySection" data-anchor="rarity"></section>

    <!-- 底部引导 -->
    <div class="seq-item text-center py-8" data-seq-delay="600" id="bottomGuide">
        <div class="gold-line max-w-[60px] mx-auto mb-5"></div>
        <p class="text-sm mb-4" style="color:var(--text-muted);">不满意这个名字？</p>
        <a href="name-result.html" class="btn-outline px-8 py-2.5 rounded-sm text-[12px] font-serif tracking-wider inline-block">返回查看其他推荐 <i class="fas fa-arrow-right ml-2 text-[9px]"></i></a>
    </div>

</div>
</main>

<!-- 固定底部操作栏 -->
<div class="bottom-bar" id="bottomBar">
    <div class="max-w-3xl mx-auto px-6 py-3">
        <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-2 min-w-0">
                <span class="font-serif text-base font-bold tracking-wider truncate" style="color:var(--gold-bright);" id="barName">—</span>
                <span class="text-xs shrink-0 hidden sm:inline" style="color:var(--text-muted);" id="barAdv">—</span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button class="btn-ghost px-2 py-2 rounded-sm text-sm" id="prevBtn" onclick="goPrev()"><i class="fas fa-chevron-left"></i></button>
                <button class="btn-gold btn-pulse px-5 py-2 rounded-sm text-[11px] font-serif tracking-wider" onclick="confirmName()">选定此名</button>
                <button class="btn-ghost px-2 py-2 rounded-sm text-sm" id="nextBtn" onclick="goNext()"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- 回到顶部 -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部"><i class="fas fa-chevron-up text-xs"></i></button>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-box rounded-sm p-6 md:p-8 max-w-sm w-full mx-4" style="background:linear-gradient(155deg,rgba(26,21,16,0.98),rgba(10,8,6,0.98));border:1px solid rgba(200,164,92,0.2);">
        <div class="text-center mb-5">
            <div class="w-12 h-12 mx-auto mb-4 rounded-full flex items-center justify-center" style="background:rgba(200,164,92,0.1);border:1px solid rgba(200,164,92,0.25);"><i class="fas fa-check text-lg" style="color:var(--gold);"></i></div>
            <h3 class="font-serif text-xl font-bold tracking-wider mb-1" style="color:var(--gold-bright);">确认选定</h3>
            <p class="text-xs" style="color:var(--text-muted);">选定后可随时在收藏中查看</p>
        </div>
        <div class="rounded-sm p-4 mb-5" style="background:rgba(200,164,92,0.04);border:1px solid rgba(200,164,92,0.1);" id="confirmContent"></div>
        <div class="flex gap-3">
            <button class="btn-outline flex-1 py-2.5 rounded-sm text-[11px]" onclick="closeModal()">再看看</button>
            <button class="btn-gold flex-1 py-2.5 rounded-sm text-[11px] font-serif tracking-wider" onclick="doConfirm()">确认选定</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================

function getCoreConclusion(nd){
    var parts=[];
    if(nd.matchCount>=2)parts.push('喜用双匹配');
    else if(nd.matchCount>=1)parts.push('喜用匹配');
    var rl=nd.rarity.level;
    if(rl==='极低')parts.push('极罕见');
    else if(rl==='低')parts.push('独特性佳');
    if(nd.score>=95)parts.push('综合极优');
    else if(nd.score>=90)parts.push('综合优秀');
    if(nd.poem&&nd.poem.length>5)parts.push('有经典出处');
    if(parts.length===0)parts.push('五行平和');
    return parts.join(' · ');
}

var geNumWx={1:'木',2:'木',3:'火',4:'火',5:'土',6:'土',7:'金',8:'金',9:'水',0:'水'};
var geNumMeaning={'天格':'先天运，祖上福泽与早年根基','人格':'主运，一生核心运势与性格特质','地格':'前运，中年以前的发展与际遇','外格':'副运，人际社交与外部助力','总格':'后运，晚年运势与人生总结'};
function calcSanCaiWuGe(surname,given){
    var sStrokes=[],gStrokes=[];
    for(var i=0;i<surname.length;i++)sStrokes.push(getStroke(surname.charAt(i)));
    for(var j=0;j<given.length;j++)gStrokes.push(getStroke(given.charAt(j)));
    var sTotal=0,gTotal=0;for(var k=0;k<sStrokes.length;k++)sTotal+=sStrokes[k];for(var l=0;l<gStrokes.length;l++)gTotal+=gStrokes[l];
    var sLast=sStrokes[sStrokes.length-1],gFirst=gStrokes[0];
    var tianGe=surname.length===1?sStrokes[0]+1:sTotal;
    var renGe=sLast+gFirst;
    var diGe=given.length===1?gStrokes[0]+1:gTotal;
    var zongGe=sTotal+gTotal;
    var waiGe=zongGe-renGe+1;
    function geJi(v){var d=v%10;return(d===1||d===2)?'吉':(d===3||d===4)?'半吉':'凶';}
    function geDesc(name,val){return{name:name,val:val,ji:geJi(val),wx:geNumWx[val%10],meaning:geNumMeaning[name]||''};}
    return[geDesc('天格',tianGe),geDesc('人格',renGe),geDesc('地格',diGe),geDesc('外格',waiGe),geDesc('总格',zongGe)];
}

/* ================================================================
   音韵
   ================================================================ */
function analyzeYinyun(nd){
    var allChars=[nd.surname].concat(nd.given.split(''));
    var tones=[],pinyins=[];
    for(var i=0;i<allChars.length;i++){var cd=charWxData[allChars[i]]||{pinyin:'?',tone:(i+1)%4+1};tones.push(cd.tone||1);pinyins.push(cd.pinyin||'?');}
    var hasPing=tones.indexOf(1)>=0||tones.indexOf(2)>=0;
    var hasZe=tones.indexOf(3)>=0||tones.indexOf(4)>=0;
    var rhythmDesc=hasPing&&hasZe?'平仄相间，抑扬有致，读来韵律优美、铿锵有力':hasZe&&!hasPing?'全为仄声，短促有力，气势果断':'全为平声，平缓悠长，温和柔顺';
    var openVowels=['a','o','e'],openCount=0;
    for(var j=0;j<pinyins.length;j++){var py=pinyins[j].toLowerCase();for(var vi=0;vi<openVowels.length;vi++){if(py.indexOf(openVowels[vi])>=0){openCount++;break;}}}
    var openDesc=openCount>=allChars.length-1?'开口音为主，发音响亮，呼唤时穿透力强':openCount===0?'闭口音为主，发音内敛含蓄，适合温雅之名':'开闭交替，发音节奏有变化，既有力度又不失柔和';
    return{allChars:allChars,tones:tones,pinyins:pinyins,rhythmDesc:rhythmDesc,openDesc:openDesc};
}

var canvas=document.getElementById('inkCanvas'),ctx=canvas.getContext('2d'),particles=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resizeCanvas();window.addEventListener('resize',resizeCanvas);
var isMob=/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
var PC=isMob?8:14;
function IP(){this.reset();}
IP.prototype.reset=function(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.radius=Math.random()*(isMob?80:120)+40;this.vx=(Math.random()-0.5)*0.1;this.vy=(Math.random()-0.5)*0.07;this.baseOpacity=Math.random()*0.015+0.003;this.opacity=this.baseOpacity;this.isGold=Math.random()>0.6;this.phase=Math.random()*Math.PI*2;};
IP.prototype.update=function(t){this.x+=this.vx;this.y+=this.vy;this.opacity=this.baseOpacity*(0.6+0.4*Math.sin(t*0.0008+this.phase));if(this.x<-this.radius)this.x=canvas.width+this.radius;if(this.x>canvas.width+this.radius)this.x=-this.radius;if(this.y<-this.radius)this.y=canvas.height+this.radius;if(this.y>canvas.height+this.radius)this.y=-this.radius;};
IP.prototype.draw=function(){var r=Math.max(1,this.radius);var g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);if(this.isGold){g.addColorStop(0,'rgba(200,164,92,'+this.opacity+')');g.addColorStop(1,'rgba(200,164,92,0)');}else{g.addColorStop(0,'rgba(232,224,212,'+this.opacity+')');g.addColorStop(1,'rgba(232,224,212,0)');}ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();};
for(var pi=0;pi<PC;pi++)particles.push(new IP());
function aC(t){ctx.clearRect(0,0,canvas.width,canvas.height);for(var i=0;i<particles.length;i++){particles[i].update(t);particles[i].draw();}requestAnimationFrame(aC);}
requestAnimationFrame(aC);

/* ================================================================
   键盘导航 + 滚动监听
   ================================================================ */
document.addEventListener('keydown',function(e){
    if(document.getElementById('confirmModal').classList.contains('show')){if(e.key==='Escape')closeModal();return;}
    if(e.key==='ArrowLeft')goPrev();
    if(e.key==='ArrowRight')goNext();
});

var scrollTick=false;
window.addEventListener('scroll',function(){
    if(!scrollTick){requestAnimationFrame(function(){
        updateActiveAnchor();
        var bt=document.getElementById('backTop');
        bt.classList.toggle('visible',window.scrollY>600);
        scrollTick=false;
    });scrollTick=true;}
});

/* ================================================================
   启动
   ================================================================ */
renderAll();
startSeqReveal();
</script>
