<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天衍 · 八字排盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    ink: { 50:'#f5f0e8',100:'#e8e0d4',200:'#c4b9a8',300:'#a89e8e',400:'#5c5347',500:'#3d352c',600:'#2a231c',700:'#1a1510',800:'#110e0a',900:'#0a0806' },
                    gold: { 50:'#fdf8ed',100:'#f5e6c0',200:'#e8d09a',300:'#d4b06a',400:'#c8a45c',500:'#b08830',600:'#8c6c24',700:'#6a5119',800:'#48380f',900:'#2a2008' },
                    vermilion: { DEFAULT:'#c4564a', light:'#d4726a', dark:'#a04038' },
                },
                fontFamily: { serif:['"Noto Serif SC"','serif'], sans:['"Noto Sans SC"','sans-serif'] }
            }
        }
    }
    </script>
    <style>
        :root {
            --bg:#0a0806; --gold:#c8a45c; --gold-bright:#e8d09a; --gold-dim:#8c6c24;
            --vermilion:#c4564a; --text:#e8e0d4; --text-muted:#a89e8e;
            --border:rgba(200,164,92,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{
            background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;
            -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
        }
        ::-webkit-scrollbar{width:5px;}
        ::-webkit-scrollbar-track{background:var(--bg);}
        ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}

        .gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.35;}
        .gold-line-v{width:1px;background:linear-gradient(180deg,transparent,var(--gold),transparent);opacity:0.25;}

        .glow-gold{text-shadow:0 0 60px rgba(200,164,92,0.15),0 0 120px rgba(200,164,92,0.05),0 0 4px rgba(200,164,92,0.08);}
        .glow-gold-strong{text-shadow:0 0 40px rgba(200,164,92,0.25),0 0 80px rgba(200,164,92,0.1),0 0 6px rgba(200,164,92,0.15);}
        .glow-score{text-shadow:0 0 12px rgba(200,164,92,0.35),0 0 4px rgba(200,164,92,0.25);}

        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0806;font-weight:600;letter-spacing:0.12em;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .btn-gold::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.6s ease;}
        .btn-gold:hover::before{left:100%;}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,164,92,0.3),0 0 12px rgba(200,164,92,0.15);}

        .btn-outline{border:1px solid rgba(200,164,92,0.35);color:var(--gold);background:transparent;transition:all 0.3s ease;}
        .btn-outline:hover{background:rgba(200,164,92,0.08);border-color:var(--gold);}

        .nav-link{position:relative;color:var(--text-muted);transition:color 0.3s;}
        .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
        .nav-link:hover{color:var(--gold);}
        .nav-link:hover::after{width:100%;}

        .wx-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:4px;font-size:12px;font-family:'Noto Serif SC',serif;}
        .wx-金{background:rgba(232,208,154,0.12);color:#e8d09a;border:1px solid rgba(232,208,154,0.25);}
        .wx-木{background:rgba(129,199,132,0.12);color:#81c784;border:1px solid rgba(129,199,132,0.25);}
        .wx-水{background:rgba(100,181,246,0.12);color:#64b5f6;border:1px solid rgba(100,181,246,0.25);}
        .wx-火{background:rgba(212,114,106,0.12);color:#d4726a;border:1px solid rgba(212,114,106,0.25);}
        .wx-土{background:rgba(212,196,160,0.12);color:#d4c4a0;border:1px solid rgba(212,196,160,0.25);}

        .tech-corners{position:relative;}
        .tech-corners .corner{position:absolute;width:18px;height:18px;pointer-events:none;z-index:2;}
        .tech-corners .corner-tl{top:8px;left:8px;border-top:2px solid rgba(200,164,92,0.5);border-left:2px solid rgba(200,164,92,0.5);}
        .tech-corners .corner-tr{top:8px;right:8px;border-top:2px solid rgba(200,164,92,0.5);border-right:2px solid rgba(200,164,92,0.5);}
        .tech-corners .corner-bl{bottom:8px;left:8px;border-bottom:2px solid rgba(200,164,92,0.5);border-left:2px solid rgba(200,164,92,0.5);}
        .tech-corners .corner-br{bottom:8px;right:8px;border-bottom:2px solid rgba(200,164,92,0.5);border-right:2px solid rgba(200,164,92,0.5);}

        @keyframes scan-line{
            0%{top:-2px;opacity:0;}8%{opacity:0.8;}92%{opacity:0.8;}100%{top:calc(100% + 2px);opacity:0;}
        }
        .tech-scan::after{
            content:'';position:absolute;left:12px;right:12px;height:1px;
            background:linear-gradient(90deg,transparent,rgba(200,164,92,0.6),rgba(200,164,92,0.6),transparent);
            animation:scan-line 3.5s ease-in-out infinite;pointer-events:none;z-index:2;
        }

        @keyframes pulse-border{
            0%,100%{border-color:rgba(200,164,92,0.22);box-shadow:0 0 0 rgba(200,164,92,0);}
            50%{border-color:rgba(200,164,92,0.55);box-shadow:0 0 20px rgba(200,164,92,0.06);}
        }
        .pulse-card{animation:pulse-border 2.5s ease-in-out infinite;}

        @keyframes node-pulse{
            0%,100%{box-shadow:0 0 0 0 rgba(200,164,92,0.35);}
            50%{box-shadow:0 0 0 10px rgba(200,164,92,0);}
        }
        .btn-final{animation:node-pulse 2s ease-in-out infinite;}

        @keyframes astrolabe-breathe{0%,100%{opacity:0.08;}50%{opacity:0.14;}}

        @keyframes data-dot{0%,100%{opacity:0.15;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

        #loadingOverlay{
            position:fixed;inset:0;z-index:9998;background:var(--bg);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            transition:opacity 0.8s ease,visibility 0.8s ease;
        }
        #loadingOverlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
        @keyframes taiji-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        @keyframes loading-pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
        @keyframes dot-blink{0%,100%{opacity:0.2;}50%{opacity:1;}}
        @keyframes astrolabe-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

        .pillar-card{
            background:linear-gradient(160deg,rgba(200,164,92,0.07) 0%,rgba(200,164,92,0.01) 100%);
            border:1px solid rgba(200,164,92,0.15);position:relative;overflow:hidden;
            transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        .pillar-card:hover{border-color:rgba(200,164,92,0.3);background:rgba(200,164,92,0.06);transform:translateY(-2px);}
        .pillar-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
        .pillar-card.is-day{border-color:rgba(200,164,92,0.35);background:rgba(200,164,92,0.09);}
        .pillar-card.estimated{border-style:dashed;}
        .pillar-card.estimated .bazi-char-block{border-style:dashed;opacity:0.7;}

        .bazi-char-block{
            width:44px;height:44px;display:flex;align-items:center;justify-content:center;
            border:1px solid rgba(200,164,92,0.2);background:rgba(200,164,92,0.05);
            font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--gold-bright);
            transition:all 0.3s;
        }
        .bazi-char-block:first-of-type{border-radius:5px 5px 0 0;border-bottom:none;}
        .bazi-char-block:last-of-type{border-radius:0 0 5px 5px;}
        .pillar-card:hover .bazi-char-block{border-color:rgba(200,164,92,0.35);background:rgba(200,164,92,0.08);}

        .estimated-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-family:'Noto Sans SC',sans-serif;background:rgba(200,164,92,0.1);border:1px dashed rgba(200,164,92,0.3);color:var(--gold);}

        .wx-bar-track{height:8px;border-radius:4px;background:rgba(200,164,92,0.06);overflow:hidden;position:relative;}
        .wx-bar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(0.23,1,0.32,1);position:relative;}
        .wx-bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);animation:shimmer 2.5s ease-in-out infinite;}
        @keyframes shimmer{0%,100%{opacity:0;}50%{opacity:1;}}
        .wx-bar-金{background:linear-gradient(90deg,rgba(232,208,154,0.3),rgba(232,208,154,0.7));}
        .wx-bar-木{background:linear-gradient(90deg,rgba(129,199,132,0.3),rgba(129,199,132,0.7));}
        .wx-bar-水{background:linear-gradient(90deg,rgba(100,181,246,0.3),rgba(100,181,246,0.7));}
        .wx-bar-火{background:linear-gradient(90deg,rgba(212,114,106,0.3),rgba(212,114,106,0.7));}
        .wx-bar-土{background:linear-gradient(90deg,rgba(212,196,160,0.3),rgba(212,196,160,0.7));}

        .xi-tag{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;border-radius:4px;font-size:13px;font-family:'Noto Serif SC',serif;cursor:default;transition:all 0.3s;}
        .xi-tag:hover{transform:scale(1.05);}
        .xi-tag.xi{background:rgba(200,164,92,0.12);border:1px solid rgba(200,164,92,0.35);color:var(--gold-bright);}
        .xi-tag.ji{background:rgba(196,86,74,0.08);border:1px solid rgba(196,86,74,0.25);color:#d4726a;}

        .analysis-card{
            background:linear-gradient(155deg,rgba(200,164,92,0.06) 0%,rgba(200,164,92,0.01) 100%);
            border:1px solid rgba(200,164,92,0.12);position:relative;overflow:hidden;
        }
        .analysis-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

        .wx-circle-container{position:relative;width:280px;height:280px;margin:0 auto;}
        .wx-node{
            position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;
            transition:all 0.5s cubic-bezier(0.23,1,0.32,1);cursor:default;z-index:2;
        }
        .wx-node:hover{transform:translate(-50%,-50%) scale(1.1);}
        .wx-node-dot{
            width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;transition:all 0.3s;
        }
        .wx-node-count{font-size:11px;font-family:'Noto Sans SC',sans-serif;color:var(--text-muted);}

        .strength-meter{position:relative;height:6px;border-radius:3px;background:rgba(200,164,92,0.08);overflow:visible;}
        .strength-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(0.23,1,0.32,1) 0.3s;}
        .strength-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:var(--bg);transition:left 1.2s cubic-bezier(0.23,1,0.32,1) 0.3s;z-index:2;}

        .progress-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;padding:6px 10px;min-width:56px;}
        .progress-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(200,164,92,0.2);background:transparent;transition:all 0.4s ease;}
        .progress-dot.completed{background:var(--gold);border-color:var(--gold);}
        .progress-dot.active{border-color:var(--gold);background:rgba(200,164,92,0.3);box-shadow:0 0 0 4px rgba(200,164,92,0.1);}
        .progress-connector{height:1px;flex:1;background:rgba(200,164,92,0.1);transition:background 0.4s ease;min-width:16px;}
        .progress-connector.completed{background:var(--gold);}

        .seq-item{opacity:0;transform:translateY(24px);transition:all 0.7s cubic-bezier(0.23,1,0.32,1);}
        .seq-item.seq-visible{opacity:1;transform:translateY(0);}

        .pillar-reveal{opacity:0;transform:translateY(30px) scale(0.95);transition:all 0.6s cubic-bezier(0.23,1,0.32,1);}
        .pillar-reveal.revealed{opacity:1;transform:translateY(0) scale(1);}

        .xi-tag-pop{opacity:0;transform:scale(0.8);transition:all 0.4s cubic-bezier(0.23,1,0.32,1);}
        .xi-tag-pop.popped{opacity:1;transform:scale(1);}

        .toast{position:fixed;top:24px;right:24px;z-index:9999;padding:14px 22px;background:rgba(200,164,92,0.12);backdrop-filter:blur(12px);border:1px solid rgba(200,164,92,0.22);color:var(--text);font-size:13px;border-radius:6px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.23,1,0.32,1);}
        .toast.show{transform:translateX(0);}

        @keyframes breathe{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:0.5;transform:scale(1.03);}}
        @keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
        @media(max-width:767px){
            .bazi-char-block{width:38px;height:38px;font-size:16px;}
            .wx-circle-container{width:220px;height:220px;}
            .wx-node-dot{width:36px;height:36px;font-size:14px;}
        }
    </style>
</head>
<body>

<!-- ====== 推演遮罩 ====== -->
<div id="loadingOverlay">
    <div style="position:relative;width:100px;height:100px;">
        <svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%;animation:astrolabe-spin 150s linear infinite, astrolabe-breathe 6s ease-in-out infinite;">
            <circle cx="50" cy="50" r="46" fill="none" stroke="#c8a45c" stroke-width="0.5" opacity="0.15"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#c8a45c" stroke-width="0.4" opacity="0.1" stroke-dasharray="2 4"/>
            <circle cx="50" cy="50" r="28" fill="none" stroke="#c8a45c" stroke-width="0.3" opacity="0.08" stroke-dasharray="1.5 5"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="#c8a45c" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 4"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="#c8a45c" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 4" transform="rotate(45 50 50)"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="#c8a45c" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 4" transform="rotate(90 50 50)"/>
            <line x1="50" y1="4" x2="50" y2="96" stroke="#c8a45c" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 4" transform="rotate(135 50 50)"/>
            <g fill="#c8a45c" opacity="0.18"><circle cx="50" cy="4" r="1.5"/><circle cx="50" cy="4" r="1.5" transform="rotate(45 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(90 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(135 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(180 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(225 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(270 50 50)"/><circle cx="50" cy="4" r="1.5" transform="rotate(315 50 50)"/></g>
        </svg>
        <svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%;animation:taiji-spin 8s linear infinite;opacity:0.35;">
            <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(200,164,92,0.2)" stroke-width="0.5"/>
            <path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(200,164,92,0.5)"/>
            <path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.1)"/>
            <circle cx="50" cy="26" r="5" fill="rgba(232,224,212,0.1)"/>
            <circle cx="50" cy="74" r="5" fill="rgba(200,164,92,0.5)"/>
        </svg>
    </div>
    <div class="font-serif text-lg tracking-[0.3em] mt-8 mb-3" style="color:var(--gold-bright);animation:loading-pulse 1.8s ease-in-out infinite;">正在推演命盘</div>
    <div class="flex items-center gap-2 text-xs" style="color:var(--text-muted);">
        <span id="ls1" style="animation:dot-blink 1.2s ease-in-out infinite;">排四柱</span>
        <span style="animation:dot-blink 1.2s ease-in-out infinite 0.2s;">·</span>
        <span id="ls2" style="opacity:0.25;">析五行</span>
        <span style="opacity:0.25;">·</span>
        <span id="ls3" style="opacity:0.25;">定喜用</span>
    </div>
</div>

<canvas id="inkCanvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<!-- ====== 导航栏 ====== -->
<nav class="fixed top-0 left-0 right-0 z-50" style="background:rgba(10,8,6,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,164,92,0.06);">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-14">
            <a href="home.html" class="flex items-center gap-2.5 group">
                <svg width="22" height="22" viewBox="0 0 100 100" class="transition-transform duration-700 group-hover:rotate-180"><circle cx="50" cy="50" r="48" fill="none" stroke="rgba(200,164,92,0.3)" stroke-width="1.5"/><path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="rgba(200,164,92,0.55)"/><path d="M50 2 A48 48 0 0 0 50 98 A24 24 0 0 0 50 50 A24 24 0 0 1 50 2" fill="rgba(232,224,212,0.12)"/><circle cx="50" cy="26" r="5.5" fill="rgba(232,224,212,0.15)"/><circle cx="50" cy="74" r="5.5" fill="rgba(200,164,92,0.55)"/></svg>
                <span class="font-serif font-bold text-sm tracking-[0.2em]" style="color:var(--gold-bright);">天衍</span>
            </a>
            <div class="flex items-center gap-4 text-[12px]">
                <span class="hidden md:inline" style="color:var(--text-muted);">八字排盘</span>
                <span class="hidden md:inline" style="color:rgba(200,164,92,0.15);">|</span>
                <a href="name-input.html" class="nav-link text-[12px]">重新输入</a>
            </div>
        </div>
    </div>
</nav>

<!-- ====== 主内容 ====== -->
<main class="relative px-6" style="z-index:1;padding-top:76px;padding-bottom:60px;">
<div class="max-w-3xl mx-auto">

    <!-- 跨页面进度条 -->
    <div class="flex items-start justify-center gap-0 mb-12 px-4 seq-item" data-seq-delay="100" style="max-width:400px;margin-left:auto;margin-right:auto;">
        <div class="progress-node">
            <div class="progress-dot completed"></div>
            <span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">输入</span>
        </div>
        <div class="progress-connector completed" style="margin-top:14px;"></div>
        <div class="progress-node">
            <div class="progress-dot active"></div>
            <span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--gold);">排盘</span>
        </div>
        <div class="progress-connector" style="margin-top:14px;"></div>
        <div class="progress-node">
            <div class="progress-dot"></div>
            <span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--text-muted);">偏好</span>
        </div>
        <div class="progress-connector" style="margin-top:14px;"></div>
        <div class="progress-node">
            <div class="progress-dot"></div>
            <span class="text-[10px] tracking-wider whitespace-nowrap" style="color:var(--text-muted);">结果</span>
        </div>
    </div>

    <!-- 信息回显 -->
    <div class="seq-item rounded-sm px-6 py-4 mb-10 flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-[13px]" data-seq-delay="200" style="background:rgba(200,164,92,0.03);border:1px solid rgba(200,164,92,0.08);" id="infoRecap"></div>

    <!-- ====== 壹 · 八字命盘 ====== -->
    <section class="mb-12" id="baziSection">
        <div class="seq-item text-center mb-8" data-seq-delay="350">
            <div class="font-serif text-4xl font-bold tracking-[0.15em] mb-2 glow-gold" style="color:var(--gold-bright);">壹</div>
            <h2 class="font-serif text-2xl md:text-3xl font-bold tracking-wider mb-2" style="color:var(--text);">八字命盘</h2>
            <p class="text-xs" style="color:var(--text-muted);">年柱根、月柱苗、日柱花、时柱果</p>
        </div>

/* ====== 八字计算 ====== */
function calcBazi(year, month, day, shichenIdx) {
    var d = new Date(year, month - 1, day);
    var yG = (year - 4) % 10, yZ = (year - 4) % 12;
    var mG = ((yG * 2 + month) % 10 + 10) % 10, mZ = ((month + 1) % 12 + 12) % 12;
    var base = new Date(2000, 0, 1), diff = Math.floor((d - base) / 86400000);
    var dG = ((diff + 6) % 10 + 10) % 10, dZ = (diff % 12 + 12) % 12;
    var shi = (shichenIdx !== null && shichenIdx !== undefined && shichenIdx !== 'unknown' && shichenIdx !== '') ? parseInt(shichenIdx) : 6;
    var hG = ((dG % 5) * 2 + shi) % 10;
    return { year:[tianGan[yG],diZhi[yZ]], month:[tianGan[mG],diZhi[mZ]], day:[tianGan[dG],diZhi[dZ]], hour:[tianGan[hG],diZhi[shi]] };
}

/* ====== 五行统计 ====== */
function countWuxing(bazi) {
    var c = {'金':0,'木':0,'水':0,'火':0,'土':0};
    var pillars = [bazi.year, bazi.month, bazi.day, bazi.hour];
    for (var p = 0; p < pillars.length; p++) {
        var tg = pillars[p][0], dz = pillars[p][1];
        c[tgWx[tg]]++; c[dzWx[dz]]++;
        var cg = dzCangGan[dz];
        if (cg && cg.length > 1) { for (var ci = 1; ci < cg.length; ci++) { c[tgWx[cg[ci]]] += 0.5; } }
    }
    return c;
}

/* ====== 日主分析 ====== */
function analyzeDayMaster(bazi) {
    var dayGan = bazi.day[0], dayWx = tgWx[dayGan];
    var help = 0, restrain = 0;
    var pillars = [bazi.year, bazi.month, bazi.day, bazi.hour];
    for (var p = 0; p < pillars.length; p++) {
        var tg = pillars[p][0], dz = pillars[p][1];
        var tgw = tgWx[tg];
        if (tgw === dayWx) help += 1.2; else if (tgw === shengWo[dayWx]) help += 0.9;
        else if (tgw === keWo[dayWx]) restrain += 0.9; else if (tgw === woSheng[dayWx]) restrain += 0.7; else restrain += 0.5;
        var dzw = dzWx[dz];
        if (dzw === dayWx) help += 1.0; else if (dzw === shengWo[dayWx]) help += 0.8;
        else if (dzw === keWo[dayWx]) restrain += 0.8; else if (dzw === woSheng[dayWx]) restrain += 0.6; else restrain += 0.4;
        var cg = dzCangGan[dz];
        if (cg && cg.length > 1) { for (var ci = 1; ci < cg.length; ci++) { var cw = tgWx[cg[ci]]; if (cw === dayWx) help += 0.4; else if (cw === shengWo[dayWx]) help += 0.3; else restrain += 0.25; } }
    }
    var mzw = dzWx[bazi.month[1]];
    if (mzw === dayWx) help += 0.6; else if (mzw === shengWo[dayWx]) help += 0.5; else restrain += 0.4;
    var isStrong = help > restrain;
    var ratio = help / (help + restrain);
    return { dayGan:dayGan, dayWx:dayWx, help:help.toFixed(1), restrain:restrain.toFixed(1), isStrong:isStrong, ratio:ratio };
}

/* ====== 喜用神 ====== */
function getXiyong(dayWx, isStrong) {
    if (isStrong) return { xi:[keWo[dayWx], woSheng[dayWx], keWoName[dayWx]], ji:[dayWx, shengWo[dayWx]] };
    else return { xi:[dayWx, shengWo[dayWx]], ji:[keWo[dayWx], woSheng[dayWx]] };
}

function guessWuxing(c) { var codes=['金','木','水','火','土']; var h=0; for(var i=0;i<c.length;i++) h=c.charCodeAt(i)+((h<<5)-h); return codes[Math.abs(h)%5]; }

/* ====== 渲染：五行条形图 ====== */
(function() {

    for (var i = 0; i < wxList.length; i++) { if (wxCount[wxList[i]] > maxVal) maxVal = wxCount[wxList[i]]; }

/* ====== 渲染：五行圆形分布 — 星盘网格 ====== */
(function() {
    var container = document.getElementById('wxCircle');
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 280 280');
    svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;animation:astrolabe-breathe 6s ease-in-out infinite;pointer-events:none;z-index:0;';

    var rings = [
        {r:135,sw:0.6,op:0.12,dash:null},
        {r:122,sw:0.5,op:0.09,dash:'2 6'},
        {r:108,sw:0.5,op:0.10,dash:'5 10'},

        {r:72,sw:0.4,op:0.07,dash:'3 12'},
        {r:52,sw:0.3,op:0.06,dash:'2 10'}

    rings.forEach(function(r) {
        var c = document.createElementNS('http://www.w3.org/2000/svg','circle');

        c.setAttribute('fill','none'); c.setAttribute('stroke','#c8a45c');
        c.setAttribute('stroke-width',r.sw); c.setAttribute('opacity',r.op);
        if (r.dash) c.setAttribute('stroke-dasharray',r.dash);
        svg.appendChild(c);
    });

    for (var i = 0; i < 4; i++) {
        var line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1','140'); line.setAttribute('y1','5');
        line.setAttribute('x2','140'); line.setAttribute('y2','275');
        line.setAttribute('stroke','#c8a45c'); line.setAttribute('stroke-width','0.4');
        line.setAttribute('opacity','0.08'); line.setAttribute('stroke-dasharray','3 7');
        line.setAttribute('transform','rotate(' + (i*45) + ' 140 140)');
        svg.appendChild(line);
    }

    var outerG = document.createElementNS('http://www.w3.org/2000/svg','g');
    outerG.setAttribute('fill','#c8a45c'); outerG.setAttribute('opacity','0.2');
    for (var i = 0; i < 8; i++) {
        var angle = i * 45 * Math.PI / 180;
        var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', (140 + 128 * Math.sin(angle)).toFixed(1));
        c.setAttribute('cy', (140 - 128 * Math.cos(angle)).toFixed(1));
        c.setAttribute('r','2.5');
        outerG.appendChild(c);
    }
    svg.appendChild(outerG);

    var innerG = document.createElementNS('http://www.w3.org/2000/svg','g');
    innerG.setAttribute('fill','#c8a45c'); innerG.setAttribute('opacity','0.12');
    for (var i = 0; i < 24; i++) {
        var angle = i * 15 * Math.PI / 180;
        var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', (140 + 112 * Math.sin(angle)).toFixed(1));
        c.setAttribute('cy', (140 - 112 * Math.cos(angle)).toFixed(1));
        c.setAttribute('r', i % 3 === 0 ? '2' : '1.5');
        innerG.appendChild(c);
    }
    svg.appendChild(innerG);
    container.insertBefore(svg, container.firstChild);

    var positions = {'水':{x:50,y:8},'火':{x:50,y:88},'木':{x:88,y:50},'金':{x:8,y:50},'土':{x:50,y:50}};
    var wxList = ['金','木','水','火','土'];

    for (var i = 0; i < wxList.length; i++) {
        var wx = wxList[i], pos = positions[wx], count = wxCount[wx];
        var isLack = count <= 1;
        var opacity = Math.max(0.4, Math.min(1, count / 3));
        var dotSize = wx === '土' ? Math.max(40, 40 + count * 3) : Math.max(38, 38 + count * 3);

        if (wx === '土') {
            var center = document.getElementById('wxCenterNode');
            center.innerHTML = '<div class="wx-node-dot" style="width:' + dotSize + 'px;height:' + dotSize + 'px;background:rgba(' + wxRgbMap[wx] + ',' + (opacity*0.15) + ');border:1.5px solid rgba(' + wxRgbMap[wx] + ',' + (opacity*0.4) + ');color:' + wxColors[wx] + ';font-size:15px;">土</div><span class="wx-node-count">' + count + '</span>' + (isLack ? '<span class="text-[8px]" style="color:#d4726a;">弱</span>' : '');
            continue;
        }

        var node = document.createElement('div');
        node.className = 'wx-node';
        node.style.left = pos.x + '%'; node.style.top = pos.y + '%';
        node.style.transform = 'translate(-50%,-50%)';
        node.innerHTML = '<div class="wx-node-dot" style="width:' + dotSize + 'px;height:' + dotSize + 'px;background:rgba(' + wxRgbMap[wx] + ',' + (opacity*0.15) + ');border:1.5px solid rgba(' + wxRgbMap[wx] + ',' + (opacity*0.4) + ');color:' + wxColors[wx] + ';font-size:15px;">' + wx + '</div><span class="wx-node-count">' + count + '</span>' + (isLack ? '<span class="text-[8px]" style="color:#d4726a;">弱</span>' : '');
        container.appendChild(node);
    }
})();

/* ====== 数字动画 ====== */
function animateNumber(el, from, to, duration) {
    var start = null;
    function step(ts) { if (!start) start = ts; var progress = Math.min((ts - start) / duration, 1); var val = from + (to - from) * (1 - Math.pow(1 - progress, 3)); el.textContent = val.toFixed(1); if (progress < 1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
}

/* ====== 水墨粒子背景 ====== */
var canvas = document.getElementById('inkCanvas'), ctx = canvas.getContext('2d'), particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
var isMob = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
var PC = isMob ? 10 : 18;
function InkParticle() { this.reset(); }
InkParticle.prototype.reset = function() {
    this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height;
    this.radius=Math.random()*(isMob?80:120)+40; this.vx=(Math.random()-0.5)*0.12; this.vy=(Math.random()-0.5)*0.08;
    this.baseOpacity=Math.random()*0.018+0.003; this.opacity=this.baseOpacity; this.isGold=Math.random()>0.6; this.phase=Math.random()*Math.PI*2;
};
InkParticle.prototype.update = function(t) {
    this.x+=this.vx; this.y+=this.vy; this.opacity=this.baseOpacity*(0.6+0.4*Math.sin(t*0.0008+this.phase));
    if(this.x<-this.radius)this.x=canvas.width+this.radius; if(this.x>canvas.width+this.radius)this.x=-this.radius;
    if(this.y<-this.radius)this.y=canvas.height+this.radius; if(this.y>canvas.height+this.radius)this.y=-this.radius;
};
InkParticle.prototype.draw = function() {
    var r=Math.max(1,this.radius); var g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
    if(this.isGold){g.addColorStop(0,'rgba(200,164,92,'+this.opacity+')');g.addColorStop(1,'rgba(200,164,92,0)');}
    else{g.addColorStop(0,'rgba(232,224,212,'+this.opacity+')');g.addColorStop(1,'rgba(232,224,212,0)');}
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2); ctx.fill();
};
for (var pi = 0; pi < PC; pi++) particles.push(new InkParticle());
function animateCanvas(t) { ctx.clearRect(0,0,canvas.width,canvas.height); for(var i=0;i<particles.length;i++){particles[i].update(t);particles[i].draw();} requestAnimationFrame(animateCanvas); }
requestAnimationFrame(animateCanvas);
</script>
